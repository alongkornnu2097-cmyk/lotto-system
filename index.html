<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงตัวเลขหวย - Multi-Receiver Sync</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* สไตล์สำหรับพื้นที่เรนเดอร์ PDF (ซ่อนจากหน้าจอปกติ) */
        #pdf-render-zone { 
            position: absolute; 
            left: -9999px; 
            top: -9999px; 
            width: 750px; 
            background: #ffffff; 
        }
        .pdf-page-container {
            padding: 50px;
            background: #ffffff;
            color: #000000;
        }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pdf-table th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; font-size: 16px; font-weight: bold; color: #1e293b; }
        .pdf-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 16px; }
        .pdf-total-row { background: #f5f3ff !important; font-weight: bold; border-top: 2px solid #4338ca; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // คอมโพเนนต์ Icon แบบเรียกใช้ Lucide โดยตรง
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // --- Multi-Receiver State ---
            const [receivers, setReceivers] = useState([
                { id: 'r1', name: 'พี่อ้อม', blockedNumbers: [] },
                { id: 'r2', name: 'น้าไก่', blockedNumbers: [] }
            ]);
            const [activeReceiverId, setActiveReceiverId] = useState('r1');
            
            const [entries, setEntries] = useState([]);
            const [number, setNumber] = useState('');
            const [price, setPrice] = useState('');
            const [type, setType] = useState('3-direct');
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('entry');
            const [isSaving, setIsSaving] = useState(false);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [showPreview, setShowPreview] = useState(false);
            const [pdfExportData, setPdfExportData] = useState({ chunks: [], currentIndex: -1 });
            const [pdfInstance, setPdfInstance] = useState(null);
            
            const [sheetUrl, setSheetUrl] = useState('https://script.google.com/macros/s/AKfycbxmTp_gZ7iJf8ixFNRVxnNr8yoPI2f6flxZ71hUZdwSbfcZb8KUvpViB8GvySHxIKRN/exec');

            const activeReceiver = useMemo(() => 
                receivers.find(r => r.id === activeReceiverId) || receivers[0]
            , [receivers, activeReceiverId]);

            const typeList = [
                { id: '3-direct', label: '3 ตัวตรง' },
                { id: '3-permute', label: '3 ตัวกลับ' },
                { id: '2-top', label: '2 ตัวบน' },
                { id: '2-bottom', label: '2 ตัวล่าง' },
                { id: '2-todd', label: '2 ตัวโต๊ด' },
                { id: 'top-float', label: 'ลอยบน' },
                { id: 'bottom-float', label: 'ลอยล่าง' },
                { id: 'pack-4', label: 'แพ 4 ตัว' },
                { id: 'pack-5', label: 'แพ 5 ตัว' }
            ];

            const getPermutations = (str) => {
                if (!str) return [];
                if (str.length <= 1) return [str];
                const perms = [];
                for (let i = 0; i < str.length; i++) {
                    const char = str[i];
                    const remainingChars = str.slice(0, i) + str.slice(i + 1);
                    for (const p of getPermutations(remainingChars)) perms.push(char + p);
                }
                return [...new Set(perms)]; 
            };

            const showAlert = (msg, type = 'error') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleAddEntry = (e) => {
                e.preventDefault();
                if (!number || !price) { showAlert('กรุณากรอกตัวเลขและราคา'); return; }

                const inputPerms = getPermutations(number);
                const hitBlock = inputPerms.find(p => activeReceiver.blockedNumbers.includes(p));
                
                if (hitBlock) {
                    showAlert(`เลขชุดนี้ติดเลขปิดของ [${activeReceiver.name}]: ${hitBlock}`, 'error');
                    return;
                }

                const priceParts = price.toLowerCase().split(/[x*]/);
                const mainPrice = parseFloat(priceParts[0]);
                let subPrice = mainPrice; 
                if (priceParts.length > 1) {
                    const secondPart = parseFloat(priceParts[1]);
                    const permsCount = getPermutations(number).length;
                    if (secondPart === permsCount && priceParts.length === 2) {
                        subPrice = mainPrice;
                    } else {
                        subPrice = secondPart;
                    }
                }

                let newItems = [];
                if (type === '3-permute') {
                    const perms = getPermutations(number);
                    newItems = perms.map(p => {
                        const itemPrice = (p === number) ? mainPrice : subPrice;
                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            number: p,
                            typeId: type,
                            typeName: '3 ตัวกลับ',
                            displayValue: `${p}=${itemPrice}`, 
                            price: itemPrice,
                            isPrimary: p === number,
                            receiverName: activeReceiver.name 
                        };
                    });
                } else {
                    const selectedType = typeList.find(t => t.id === type);
                    newItems = [{
                        id: Math.random().toString(36).substr(2, 9),
                        number,
                        typeId: type,
                        typeName: selectedType ? selectedType.label : 'ทั่วไป',
                        displayValue: `${number}=${mainPrice}`,
                        price: mainPrice,
                        isPrimary: true,
                        receiverName: activeReceiver.name 
                    }];
                }

                setEntries([...entries, ...newItems]);
                setNumber('');
                setPrice('');
                showAlert(`เพิ่มรายการให้ [${activeReceiver.name}] แล้ว`, 'success');
            };

            const saveToGoogleSheets = async () => {
                if (entries.length === 0) return;
                setIsSaving(true);
                try {
                    await fetch(sheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        body: JSON.stringify({ entries: entries })
                    });
                    showAlert('บันทึกข้อมูลแยกจ้าวสำเร็จ!', 'success');
                    setEntries([]); 
                } catch (error) {
                    showAlert('การเชื่อมต่อผิดพลาด');
                } finally {
                    setIsSaving(false);
                }
            };

            const chunkArray = (array, size) => {
                const chunks = [];
                for (let i = 0; i < array.length; i += size) {
                    chunks.push(array.slice(i, i + size));
                }
                return chunks;
            };

            const startExportPDF = () => {
                setIsGeneratingPDF(true);
                const chunks = chunkArray(entries, 20); 
                setPdfExportData({ chunks, currentIndex: 0 });
            };

            useEffect(() => {
                if (isGeneratingPDF && pdfExportData.currentIndex >= 0) {
                    processPdfPage();
                }
            }, [pdfExportData.currentIndex, isGeneratingPDF]);

            const processPdfPage = async () => {
                const { chunks, currentIndex } = pdfExportData;
                const element = document.getElementById('pdf-render-zone');
                if (!element) return;

                try {
                    await new Promise(r => setTimeout(r, 1200)); 
                    const canvas = await html2canvas(element, { scale: 3, useCORS: true, backgroundColor: "#ffffff" });
                    const imgData = canvas.toDataURL('image/png');
                    let currentPdf = pdfInstance;

                    const { jsPDF } = window.jspdf;
                    if (currentIndex === 0) {
                        currentPdf = new jsPDF('p', 'mm', 'a4');
                    } else {
                        currentPdf.addPage();
                    }

                    const pdfWidth = currentPdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    currentPdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);

                    if (currentIndex < chunks.length - 1) {
                        setPdfInstance(currentPdf);
                        setPdfExportData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 }));
                    } else {
                        currentPdf.save(`Report-${new Date().getTime()}.pdf`);
                        showAlert('ดาวน์โหลด PDF สำเร็จ', 'success');
                        setIsGeneratingPDF(false);
                        setShowPreview(false);
                        setPdfExportData({ chunks: [], currentIndex: -1 });
                        setPdfInstance(null);
                    }
                } catch (err) {
                    showAlert('สร้าง PDF ไม่สำเร็จ');
                    setIsGeneratingPDF(false);
                }
            };

            const totalPrice = useMemo(() => entries.reduce((sum, item) => sum + item.price, 0), [entries]);

            const addReceiver = () => {
                const name = prompt('กรุณาระบุชื่อจ้าวใหม่:');
                if (name) {
                    setReceivers([...receivers, { id: 'r' + Date.now(), name, blockedNumbers: [] }]);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8">
                    <div className="max-w-4xl mx-auto shadow-2xl rounded-2xl overflow-hidden bg-white">
                        <header className="bg-indigo-700 text-white p-6 flex justify-between items-center shadow-lg">
                            <div>
                                <h1 className="text-2xl font-bold flex items-center gap-2">
                                    <Icon name="database" className="text-indigo-300" /> ระบบลงตัวเลขหวยอัจฉริยะ
                                </h1>
                                <p className="text-indigo-100 text-sm tracking-widest uppercase text-[10px] mt-1">Matrix Expansion & Multi-Receiver Sync</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setActiveTab('entry')} className={`p-2 rounded-xl transition ${activeTab === 'entry' ? 'bg-white text-indigo-700' : 'hover:bg-indigo-600'}`}><Icon name="list" size={24} /></button>
                                <button onClick={() => setActiveTab('settings')} className={`p-2 rounded-xl transition ${activeTab === 'settings' ? 'bg-white text-indigo-700' : 'hover:bg-indigo-600'}`}><Icon name="settings" size={24} /></button>
                            </div>
                        </header>

                        {notification && (
                            <div className={`fixed top-4 right-4 z-[200] p-4 rounded-2xl shadow-2xl text-white font-bold animate-bounce flex items-center gap-3 ${notification.type === 'error' ? 'bg-red-500' : 'bg-green-600'}`}>
                                <Icon name={notification.type === 'error' ? 'x-circle' : 'check-circle-2'} />
                                <span>{notification.msg}</span>
                            </div>
                        )}

                        <main className="min-h-[600px]">
                            {activeTab === 'entry' ? (
                                <div className="grid md:grid-cols-2 divide-x divide-slate-100">
                                    <div className="p-6 space-y-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">เลือกจ้าวที่กำลังลง:</label>
                                            <div className="flex flex-wrap gap-2">
                                                {receivers.map(r => (
                                                    <button key={r.id} onClick={() => setActiveReceiverId(r.id)} className={`px-4 py-2 rounded-full text-xs font-bold border-2 transition ${activeReceiverId === r.id ? 'bg-indigo-100 border-indigo-600 text-indigo-700 shadow-sm' : 'bg-white border-slate-100 text-slate-400 hover:border-indigo-200'}`}>{r.name}</button>
                                                ))}
                                            </div>
                                        </div>

                                        <form onSubmit={handleAddEntry} className="space-y-4">
                                            <div className="grid grid-cols-3 gap-2">
                                                {typeList.map(t => (
                                                    <button key={t.id} type="button" onClick={() => setType(t.id)} className={`p-2 text-[10px] rounded-xl border-2 transition ${type === t.id ? 'bg-indigo-600 text-white border-indigo-600 font-bold' : 'bg-slate-50 border-slate-100 text-slate-500 hover:border-indigo-200'}`}>{t.label}</button>
                                                ))}
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="number" value={number} onChange={(e) => setNumber(e.target.value)} placeholder="เลข" className="p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-3xl text-center outline-none focus:border-indigo-500" />
                                                <input type="text" value={price} onChange={(e) => setPrice(e.target.value)} placeholder="ราคา" className="p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-3xl font-bold text-center text-indigo-700 outline-none focus:border-indigo-500" />
                                            </div>
                                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition active:scale-95 flex items-center justify-center gap-2"><Icon name="plus" /> เพิ่มรายการ</button>
                                        </form>

                                        <div className="bg-rose-50 p-4 rounded-2xl border-2 border-rose-100 shadow-inner">
                                            <div className="flex items-center gap-2 text-rose-800 font-bold mb-2 text-xs uppercase tracking-wider font-bold"><Icon name="alert-circle" size={14} /> เลขปิดของ [{activeReceiver.name}]:</div>
                                            <div className="flex flex-wrap gap-2">
                                                {activeReceiver.blockedNumbers.length > 0 ? activeReceiver.blockedNumbers.map(n => <span key={n} className="bg-white px-2 py-1 rounded-lg border border-rose-200 text-xs font-mono font-bold text-rose-600 shadow-sm">{n}</span>) : <span className="text-xs text-rose-300 italic">ไม่มีเลขปิด</span>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50/50 flex flex-col h-[600px] md:h-auto">
                                        <div className="p-6 font-bold text-slate-800 flex items-center justify-between border-b border-slate-100 font-bold">
                                            <span>ตะกร้ารวม ({entries.length})</span>
                                        </div>
                                        <div className="flex-grow overflow-y-auto p-6 space-y-2 custom-scrollbar">
                                            {entries.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-40"><Icon name="database" size={48} /><p className="text-sm font-bold mt-2 uppercase tracking-widest">Empty Basket</p></div>
                                            ) : entries.map(item => (
                                                <div key={item.id} className={`bg-white p-4 rounded-xl border-2 flex justify-between items-center shadow-sm transition-all ${item.isPrimary ? 'border-indigo-100 shadow-indigo-100/50' : 'border-slate-50 opacity-80'}`}>
                                                    <div>
                                                        <div className="font-mono font-black text-2xl text-slate-800 leading-none mb-1">{item.number}</div>
                                                        <div className="flex gap-2 text-[8px] font-bold uppercase">
                                                            <span className="text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded">{item.typeName}</span>
                                                            <span className="text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">จ้าว: {item.receiverName}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <span className="font-bold text-slate-700">฿{item.price.toLocaleString()}</span>
                                                        <button onClick={() => setEntries(entries.filter(e => e.id !== item.id))} className="text-slate-200 hover:text-rose-500 transition-colors"><Icon name="trash-2" size={18} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-6 bg-white border-t border-slate-100 space-y-3">
                                            <div className="flex justify-between items-end"><span className="text-xs text-slate-400 font-black uppercase tracking-widest leading-none font-bold">ยอดรวมสุทธิ</span><span className="text-3xl font-black text-indigo-800 leading-none">฿{totalPrice.toLocaleString()}</span></div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <button onClick={() => setShowPreview(true)} disabled={entries.length === 0} className="py-3 rounded-xl font-bold flex justify-center items-center gap-2 border-2 border-indigo-600 text-indigo-700 hover:bg-indigo-50 shadow-sm transition active:scale-95 disabled:opacity-30"><Icon name="eye" size={18} /> ดูตัวอย่าง PDF</button>
                                                <button onClick={saveToGoogleSheets} disabled={isSaving || entries.length === 0} className="py-3 rounded-xl text-white font-bold flex justify-center items-center gap-2 bg-emerald-600 hover:bg-emerald-700 shadow-lg transition active:scale-95 disabled:opacity-30">{isSaving ? <Icon name="loader" className="animate-spin" /> : <><Icon name="send" size={18} /> ส่งแยกจ้าว</>}</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-8 max-w-2xl mx-auto space-y-10">
                                    <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 shadow-inner">
                                        <label className="text-sm font-bold text-indigo-900 block mb-2 uppercase tracking-wider font-bold">Web App URL (Google Sheets)</label>
                                        <input value={sheetUrl} onChange={(e) => setSheetUrl(e.target.value)} className="w-full p-4 bg-white border-2 border-indigo-100 rounded-2xl font-mono text-xs outline-none focus:ring-4 focus:ring-indigo-500/10" />
                                    </div>
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center border-b pb-4"><h2 className="text-xl font-black text-slate-800 uppercase font-bold tracking-tight">จัดการชื่อจ้าว</h2><button onClick={addReceiver} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md hover:bg-indigo-700 flex items-center gap-2 font-bold"><Icon name="user-plus" size={16}/> เพิ่มจ้าวใหม่</button></div>
                                        <div className="grid gap-6">
                                            {receivers.map(r => (
                                                <div key={r.id} className="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100 space-y-4">
                                                    <div className="flex justify-between items-center font-bold">
                                                        <span className="text-lg font-black text-indigo-700">{r.name}</span>
                                                        <button onClick={() => receivers.length > 1 && setReceivers(receivers.filter(x => x.id !== r.id))} className="text-rose-300 hover:text-rose-500 transition-colors"><Icon name="trash-2" size={20}/></button>
                                                    </div>
                                                    <div className="space-y-3">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-bold">เพิ่มเลขปิดสำหรับ {r.name}:</label>
                                                        <div className="flex gap-2">
                                                            <input id={`input-${r.id}`} type="number" placeholder="เลขปิด" className="flex-grow p-3 bg-white border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-mono" />
                                                            <button onClick={() => { const v = document.getElementById(`input-${r.id}`).value; if(v) setReceivers(receivers.map(x => x.id === r.id ? {...x, blockedNumbers: [...x.blockedNumbers, v]} : x)); document.getElementById(`input-${r.id}`).value = ''; }} className="bg-slate-800 text-white px-6 rounded-xl font-bold active:scale-95 transition font-bold">เพิ่ม</button>
                                                        </div>
                                                        <div className="flex flex-wrap gap-2">
                                                            {r.blockedNumbers.map(num => <span key={num} className="bg-white px-2.5 py-1 rounded-lg border border-rose-200 text-rose-600 font-mono font-bold flex items-center gap-2 text-xs shadow-sm">{num}<button onClick={() => setReceivers(receivers.map(x => x.id === r.id ? {...x, blockedNumbers: x.blockedNumbers.filter(z => z !== num)} : x))}><Icon name="x" size={12}/></button></span>)}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* Modal พรีวิว */}
                        {showPreview && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm overflow-y-auto">
                                <div className="bg-white rounded-3xl w-full max-w-4xl shadow-2xl relative flex flex-col max-h-[90vh]">
                                    <div className="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-3xl font-bold">
                                        <h2 className="font-bold text-slate-700 flex items-center gap-2"><Icon name="eye" size={20} className="text-indigo-600" /> ตรวจสอบรายงานรวมจ้าว</h2>
                                        <button onClick={() => setShowPreview(false)} className="p-2 hover:bg-slate-200 rounded-full transition-colors"><Icon name="x" size={24} /></button>
                                    </div>
                                    <div className="flex-grow overflow-y-auto p-4 md:p-10 bg-slate-100 custom-scrollbar">
                                        <div className="bg-white p-6 md:p-12 shadow-sm rounded-lg mx-auto max-w-[800px] border border-slate-200">
                                            <div className="border-b-4 border-indigo-700 pb-4 mb-6 flex justify-between items-end">
                                                <div><h1 className="text-3xl font-black text-indigo-700 leading-tight font-black">สรุปรายการหวยรวม</h1><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 font-bold">Multi-Receiver Consolidated Report</p></div>
                                                <div className="text-right text-slate-400 text-[10px] font-bold uppercase">พิมพ์เมื่อ: {new Date().toLocaleString('th-TH')}</div>
                                            </div>
                                            <table className="w-full text-sm">
                                                <thead className="bg-slate-50 font-bold text-slate-600 border-b-2"><tr><td className="p-3">ลำดับ</td><td className="p-3">เลข</td><td className="p-3">ประเภท / จ้าว</td><td className="p-3 text-right">ราคา</td></tr></thead>
                                                <tbody>
                                                    {entries.map((item, index) => (
                                                        <tr key={item.id} className="border-b border-slate-50"><td className="p-3 text-slate-400">{index+1}</td><td className="p-3 font-mono font-bold text-xl leading-none text-slate-900">{item.number}</td><td className="p-3 text-indigo-600 uppercase text-[10px] font-bold">{item.typeName} ({item.receiverName})</td><td className="p-3 text-right font-bold text-lg text-slate-900 font-bold">฿{item.price.toLocaleString()}</td></tr>
                                                    ))}
                                                    <tr className="bg-indigo-50 font-black"><td colSpan="3" className="p-6 text-right text-indigo-900 text-xl uppercase font-bold tracking-tighter">ยอดรวมสุทธิทั้งสิ้น</td><td className="p-6 text-right text-indigo-700 text-3xl decoration-double underline font-black">฿{totalPrice.toLocaleString()}</td></tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="p-6 border-t bg-white rounded-b-3xl flex flex-col md:flex-row gap-3">
                                        <button onClick={() => setShowPreview(false)} className="flex-1 py-4 font-bold bg-slate-100 rounded-2xl hover:bg-slate-200 transition-all font-bold">กลับไปแก้ไข</button>
                                        <button onClick={startExportPDF} disabled={isGeneratingPDF} className="flex-[2] py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl flex items-center justify-center gap-2 transition active:scale-95 font-bold shadow-indigo-200">
                                            {isGeneratingPDF ? <Icon name="loader" className="animate-spin" /> : <><Icon name="file-down" size={20} /> ยืนยันดาวน์โหลด PDF</>}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* พื้นที่ Render PDF (ซ่อน) */}
                        <div id="pdf-render-zone">
                            {isGeneratingPDF && pdfExportData.chunks[pdfExportData.currentIndex] && (
                                <div className="pdf-page-container">
                                    <div style={{ borderBottom: '6px solid #4338ca', paddingBottom: '15px', marginBottom: '25px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                                        <div><h1 style={{ fontSize: '38px', fontWeight: '900', color: '#4338ca', margin: '0' }}>รายงานลงหวยแยกจ้าว</h1><p style={{ color: '#64748b', fontSize: '11px', margin: '5px 0 0 0', textTransform: 'uppercase', letterSpacing: '2px', fontWeight: 'bold' }}>Multi-Receiver Sync Mode &bull; Consolidated</p></div>
                                        <div style={{ textAlign: 'right', fontSize: '12px', color: '#94a3b8', fontWeight: 'bold' }}>หน้า {pdfExportData.currentIndex + 1} / {pdfExportData.chunks.length} | {new Date().toLocaleString('th-TH')}</div>
                                    </div>
                                    <table className="pdf-table">
                                        <thead><tr><th>#</th><th>ตัวเลข</th><th>ประเภท / จ้าว</th><th style={{ textAlign: 'right' }}>ราคา (บาท)</th></tr></thead>
                                        <tbody>
                                            {pdfExportData.chunks[pdfExportData.currentIndex].map((item, idx) => (
                                                <tr key={item.id}>
                                                    <td style={{ color: '#94a3b8', fontWeight: 'bold' }}>{(pdfExportData.currentIndex * 20) + idx + 1}</td>
                                                    <td style={{ fontSize: '26px', fontWeight: 'bold', fontFamily: 'JetBrains Mono', color: '#1e293b' }}>{item.number}</td>
                                                    <td style={{ color: '#4338ca', fontSize: '12px', fontWeight: 'bold', textTransform: 'uppercase' }}>{item.typeName} ({item.receiverName})</td>
                                                    <td style={{ textAlign: 'right', fontSize: '20px', fontWeight: 'bold', color: '#0f172a' }}>{item.price.toLocaleString()}</td>
                                                </tr>
                                            ))}
                                            {pdfExportData.currentIndex === pdfExportData.chunks.length - 1 && (
                                                <tr className="pdf-total-row">
                                                    <td colSpan="3" style={{ textAlign: 'right', padding: '30px 20px', fontSize: '22px', color: '#312e81', borderTop: '2px solid #4338ca' }}>ยอดรวมสุทธิทั้งสิ้น</td>
                                                    <td style={{ textAlign: 'right', padding: '30px 20px', fontSize: '38px', color: '#4338ca', borderTop: '2px solid #4338ca', borderBottom: '6px double #4338ca' }}>฿{totalPrice.toLocaleString()}</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                    <div style={{ marginTop: '50px', textAlign: 'center', fontSize: '10px', color: '#cbd5e1', letterSpacing: '5px', textTransform: 'uppercase', fontWeight: 'bold' }}>Professional MatrixSync &bull; 2026 Edition</div>
                                </div>
                            )}
                        </div>

                        <footer className="p-6 bg-slate-50 text-center text-[10px] text-slate-400 font-bold uppercase tracking-[0.5em] border-t font-bold">Smart Matrix Sync &bull; 2026 Edition</footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

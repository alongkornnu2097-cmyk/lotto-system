<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงตัวเลขหวย - Professional Management</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        #pdf-render-zone { 
            position: absolute; 
            left: -9999px; 
            top: -9999px; 
            width: 750px; 
            background: #ffffff; 
        }
        .pdf-page-container {
            padding: 30px 40px;
            background: #ffffff;
            color: #000000;
        }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .pdf-table th { background: #f8fafc; padding: 6px 8px; text-align: left; border-bottom: 1px solid #cbd5e1; font-size: 13px; font-weight: bold; color: #1e293b; }
        .pdf-table td { padding: 4px 8px; border-bottom: 1px solid #f1f5f9; font-size: 12px; line-height: 1.2; }
        .pdf-total-row { background: #f5f3ff !important; font-weight: bold; border-top: 1.5px solid #4338ca; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [receivers, setReceivers] = useState([
                { id: 'r1', name: 'พี่อ้อม', blockedNumbers: [] },
                { id: 'r2', name: 'น้าไก่', blockedNumbers: [] }
            ]);
            const [activeReceiverId, setActiveReceiverId] = useState('r1');
            const [entries, setEntries] = useState([]);
            const [number, setNumber] = useState('');
            const [price, setPrice] = useState('');
            const [type, setType] = useState('3-direct');
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('entry');
            const [isSaving, setIsSaving] = useState(false);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [showPreview, setShowPreview] = useState(false);
            const [pdfExportData, setPdfExportData] = useState({ chunks: [], currentIndex: -1 });
            const [pdfInstance, setPdfInstance] = useState(null);
            
            const [sheetUrl, setSheetUrl] = useState('https://script.google.com/macros/s/AKfycbxmTp_gZ7iJf8ixFNRVxnNr8yoPI2f6flxZ71hUZdwSbfcZb8KUvpViB8GvySHxIKRN/exec');

            const activeReceiver = useMemo(() => 
                receivers.find(r => r.id === activeReceiverId) || receivers[0]
            , [receivers, activeReceiverId]);

            const typeList = [
                { id: '3-direct', label: '3 ตัวตรง' },
                { id: '3-permute', label: '3 ตัวกลับ' },
                { id: '2-top', label: '2 ตัวบน' },
                { id: '2-top-permute', label: '2 ตัวบนกลับ' },
                { id: '2-bottom', label: '2 ตัวล่าง' },
                { id: '2-bottom-permute', label: '2 ตัวล่างกลับ' },
                { id: '2-todd', label: '2 ตัวโต๊ด' },
                { id: 'top-float', label: 'ลอยบน' },
                { id: 'bottom-float', label: 'ลอยล่าง' },
                { id: 'pack-4', label: 'แพ 4 ตัว' },
                { id: 'pack-5', label: 'แพ 5 ตัว' }
            ];

            const getPermutations = (str) => {
                if (!str || typeof str !== 'string') return [];
                if (str.length <= 1) return [str];
                const perms = [];
                for (let i = 0; i < str.length; i++) {
                    const char = str[i];
                    const remainingChars = str.slice(0, i) + str.slice(i + 1);
                    for (const p of getPermutations(remainingChars)) perms.push(char + p);
                }
                return [...new Set(perms)]; 
            };

            const showAlert = (msg, type = 'error') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleAddEntry = (e) => {
                e.preventDefault();
                if (!number || !price) { showAlert('กรุณากรอกตัวเลขและราคา'); return; }

                const perms = getPermutations(number);
                const hitBlock = perms.find(p => activeReceiver.blockedNumbers.includes(p));
                
                if (hitBlock) {
                    showAlert(`เลขชุดนี้ติดเลขปิดของ [${activeReceiver.name}]: ${hitBlock}`, 'error');
                    return;
                }

                const priceParts = price.toLowerCase().split(/[x*]/);
                const isPermuteType = ['3-permute', '2-top-permute', '2-bottom-permute'].includes(type);

                let newItems = [];
                const selectedType = typeList.find(t => t.id === type) || { label: 'ทั่วไป' };

                if (isPermuteType) {
                    const p1 = parseFloat(priceParts[0]);
                    const p2 = priceParts.length > 1 ? parseFloat(priceParts[1]) : p1;
                    
                    let mainPrice, subPrice;
                    
                    if (priceParts.length > 1 && p2 === perms.length) {
                        mainPrice = p1;
                        subPrice = p1;
                    } else {
                        mainPrice = p1;
                        subPrice = p2;
                    }

                    newItems = perms.map(p => {
                        const itemPrice = (p === number) ? mainPrice : subPrice;
                        const itemDisplay = `${p}=${itemPrice}`;
                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            number: p,
                            typeId: type,
                            typeName: selectedType.label,
                            displayValue: itemDisplay,
                            price: itemPrice,
                            isPrimary: p === number,
                            receiverName: activeReceiver.name,
                            details: itemDisplay
                        };
                    });
                } else {
                    const totalInputPrice = priceParts.reduce((acc, curr) => acc + (parseFloat(curr) || 0), 0);
                    const formattedDetails = `${number}=${price}`;

                    newItems = [{
                        id: Math.random().toString(36).substr(2, 9),
                        number,
                        typeId: type,
                        typeName: selectedType.label,
                        displayValue: formattedDetails,
                        price: totalInputPrice,
                        isPrimary: true,
                        receiverName: activeReceiver.name,
                        details: formattedDetails
                    }];
                }

                setEntries([...entries, ...newItems]);
                setNumber('');
                setPrice('');
                showAlert(`เพิ่มรายการให้ [${activeReceiver.name}] เรียบร้อย`, 'success');
            };

            const addBlockedNumberSmart = (rid, val) => {
                if (!val) return;
                const perms = getPermutations(val);
                setReceivers(receivers.map(r => {
                    if (r.id === rid) {
                        const updatedBlocks = [...new Set([...r.blockedNumbers, ...perms])];
                        return { ...r, blockedNumbers: updatedBlocks };
                    }
                    return r;
                }));
                showAlert(`ล็อกเลข ${val} และเลขสลับตำแหน่งให้ [${receivers.find(x => x.id === rid).name}] แล้ว`, 'success');
            };

            const saveToGoogleSheets = async () => {
                if (entries.length === 0) return;
                setIsSaving(true);
                try {
                    await fetch(sheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        body: JSON.stringify({ entries: entries })
                    });
                    showAlert('บันทึกข้อมูลลงชีตสำเร็จ!', 'success');
                    setEntries([]); 
                } catch (error) {
                    showAlert('การเชื่อมต่อผิดพลาด');
                } finally {
                    setIsSaving(false);
                }
            };

            const chunkArray = (array, size) => {
                const chunks = [];
                for (let i = 0; i < array.length; i += size) {
                    chunks.push(array.slice(i, i + size));
                }
                return chunks;
            };

            const startExportPDF = () => {
                if (entries.length === 0) return;
                setIsGeneratingPDF(true);
                const chunks = chunkArray(entries, 35); 
                setPdfExportData({ chunks, currentIndex: 0 });
            };

            useEffect(() => {
                if (isGeneratingPDF && pdfExportData.currentIndex >= 0) {
                    processPdfPage();
                }
            }, [pdfExportData.currentIndex, isGeneratingPDF]);

            const processPdfPage = async () => {
                const { chunks, currentIndex } = pdfExportData;
                const element = document.getElementById('pdf-render-zone');
                try {
                    await new Promise(r => setTimeout(r, 1500)); 
                    const canvas = await html2canvas(element, { scale: 3, useCORS: true, backgroundColor: "#ffffff" });
                    const imgData = canvas.toDataURL('image/png');
                    let currentPdf = pdfInstance;
                    if (currentIndex === 0) {
                        currentPdf = new jspdf.jsPDF('p', 'mm', 'a4');
                    } else {
                        currentPdf.addPage();
                    }
                    const pdfWidth = currentPdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    currentPdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);

                    if (currentIndex < chunks.length - 1) {
                        setPdfInstance(currentPdf);
                        setPdfExportData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 }));
                    } else {
                        currentPdf.save(`Report-${new Date().getTime()}.pdf`);
                        showAlert('ดาวน์โหลด PDF สำเร็จ', 'success');
                        resetPdfExport();
                    }
                } catch (err) { showAlert('สร้าง PDF ไม่สำเร็จ'); resetPdfExport(); }
            };

            const resetPdfExport = () => {
                setIsGeneratingPDF(false);
                setShowPreview(false);
                setPdfExportData({ chunks: [], currentIndex: -1 });
                setPdfInstance(null);
            };

            const totalPrice = useMemo(() => entries.reduce((sum, item) => sum + item.price, 0), [entries]);

            const addReceiver = () => {
                const name = prompt('กรุณาระบุชื่อจ้าวใหม่:');
                if (name) {
                    setReceivers([...receivers, { id: 'r' + Date.now(), name, blockedNumbers: [] }]);
                }
            };

            return (
                <div className="min-h-screen p-2 md:p-8 bg-slate-50 font-bold">
                    <div className="max-w-4xl mx-auto shadow-2xl rounded-2xl overflow-hidden bg-white">
                        <header className="bg-indigo-700 text-white p-6 flex justify-between items-center shadow-lg">
                            <div>
                                <h1 className="text-2xl font-bold flex items-center gap-2 font-black tracking-tight">
                                    <Icon name="database" /> ระบบลงหวยอัจฉริยะ
                                </h1>
                                <p className="text-[10px] text-indigo-200 uppercase tracking-widest mt-1 font-bold">Multi-Receiver Sync & Smart Block</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setActiveTab('entry')} className={`p-2 rounded-xl transition-all ${activeTab === 'entry' ? 'bg-white text-indigo-700 shadow-md scale-105' : 'hover:bg-indigo-600'}`}><Icon name="list" size={24}/></button>
                                <button onClick={() => setActiveTab('settings')} className={`p-2 rounded-xl transition-all ${activeTab === 'settings' ? 'bg-white text-indigo-700 shadow-md scale-105' : 'hover:bg-indigo-600'}`}><Icon name="settings" size={24}/></button>
                            </div>
                        </header>

                        {notification && (
                            <div className={`fixed top-4 right-4 z-[200] p-4 rounded-2xl shadow-2xl text-white font-bold animate-bounce flex items-center gap-3 ${notification.type === 'error' ? 'bg-red-500' : 'bg-green-600'}`}>
                                <Icon name={notification.type === 'error' ? 'x-circle' : 'check-circle-2'} size={24} />
                                <span>{notification.msg}</span>
                            </div>
                        )}

                        {activeTab === 'entry' ? (
                            <div className="grid md:grid-cols-2 divide-x divide-slate-100 min-h-[550px]">
                                <div className="p-5 md:p-8 space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block font-bold">เลือกจ้าวที่กำลังลง:</label>
                                        <div className="flex flex-wrap gap-2">
                                            {receivers.map(r => (
                                                <button key={r.id} onClick={() => setActiveReceiverId(r.id)} className={`px-4 py-2 rounded-full text-xs font-bold border-2 transition-all ${activeReceiverId === r.id ? 'bg-indigo-100 border-indigo-600 text-indigo-700 font-bold shadow-sm' : 'bg-white border-slate-100 text-slate-400 hover:border-indigo-200'}`}>{r.name}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <form onSubmit={handleAddEntry} className="space-y-4">
                                        <div className="grid grid-cols-3 gap-2">
                                            {typeList.map(t => (
                                                <button key={t.id} type="button" onClick={() => setType(t.id)} className={`p-2 text-[10px] rounded-xl border-2 transition-all ${type === t.id ? 'bg-indigo-600 text-white border-indigo-600 font-bold shadow-md' : 'bg-slate-50 border-slate-100 text-slate-500 hover:border-indigo-200'}`}>{t.label}</button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">ตัวเลข</label>
                                                <input type="number" value={number} onChange={e => setNumber(e.target.value)} placeholder="000" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-3xl outline-none focus:border-indigo-500 text-center" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">ราคา (เช่น 110*50)</label>
                                                <input type="text" value={price} onChange={e => setPrice(e.target.value)} placeholder="0" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-3xl outline-none focus:border-indigo-500 text-center font-bold text-indigo-700" />
                                            </div>
                                        </div>
                                        <button className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-transform active:scale-95"><Icon name="plus" /> เพิ่มรายการลงจ้าว [{activeReceiver.name}]</button>
                                    </form>

                                    <div className="bg-rose-50 p-4 rounded-xl border-2 border-rose-100 shadow-inner">
                                        <div className="flex items-center gap-2 text-rose-800 font-bold mb-2 font-black uppercase text-[10px]"><Icon name="lock" size={14} /> เลขที่ถูกปิดกั้นของ [{activeReceiver.name}]:</div>
                                        <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scrollbar">
                                            {activeReceiver.blockedNumbers.length > 0 ? (
                                                activeReceiver.blockedNumbers.map(n => <span key={n} className="bg-white px-3 py-1 rounded-lg border border-rose-200 text-[10px] font-mono font-black text-rose-600 shadow-sm">{n}</span>)
                                            ) : (
                                                <span className="text-[10px] text-rose-400 italic font-bold">ไม่มีเลขปิดสำหรับจ้าวนี้</span>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="p-0 bg-slate-50/30 flex flex-col h-[600px] md:h-auto border-l">
                                    <div className="p-6 flex justify-between items-center border-b border-slate-100 font-bold"><h3 className="font-black text-slate-800 flex items-center gap-2 uppercase tracking-tight font-bold"><Icon name="shopping-cart" size={18} className="text-indigo-500" /> ตะกร้ารวม ({entries.length})</h3></div>
                                    <div className="flex-grow overflow-y-auto space-y-2 p-6 custom-scrollbar">
                                        {entries.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 py-20 opacity-30"><Icon name="box" size={64} /><p className="text-sm font-bold uppercase tracking-widest">ยังไม่มีรายการ</p></div>
                                        ) : (
                                            entries.map(item => (
                                                <div key={item.id} className={`bg-white p-4 rounded-xl border-2 flex justify-between items-center shadow-sm transition-all ${item.isPrimary ? 'border-indigo-100 shadow-indigo-100/50' : 'border-slate-50 opacity-80'}`}>
                                                    <div><div className={`font-mono font-black text-2xl ${item.isPrimary ? 'text-indigo-700' : 'text-slate-600'}`}>{item.displayValue}</div><div className="flex gap-2 mt-1"><div className="text-[8px] text-slate-400 font-bold uppercase tracking-tighter bg-slate-100 px-2 py-0.5 rounded-full">{item.typeName}</div><div className="text-[8px] text-indigo-600 font-bold uppercase tracking-tighter bg-indigo-50 px-2 py-0.5 rounded-full">ส่ง: {item.receiverName}</div></div></div>
                                                    <div className="flex items-center gap-4"><span className="font-black text-lg text-slate-700 font-bold">฿{item.price.toLocaleString()}</span><button onClick={() => setEntries(entries.filter(e => e.id !== item.id))} className="text-slate-200 hover:text-rose-500 transition-colors"><Icon name="trash-2" size={18} /></button></div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                    <div className="p-6 bg-white border-t-2 border-slate-100 space-y-3">
                                        <div className="flex justify-between items-end"><span className="text-xs text-slate-400 font-bold uppercase tracking-widest leading-none font-bold">ยอดรวมทั้งหมด</span><span className="text-3xl font-black text-indigo-900 leading-none">฿{totalPrice.toLocaleString()}</span></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={() => setShowPreview(true)} disabled={entries.length === 0} className="py-3 rounded-xl font-bold flex justify-center items-center gap-2 border-2 border-indigo-600 text-indigo-700 hover:bg-indigo-50 shadow-sm transition-all active:scale-95 disabled:opacity-30"><Icon name="eye" size={18} /> ดูรายงาน PDF</button>
                                            <button onClick={saveToGoogleSheets} disabled={isSaving || entries.length === 0} className="py-3 rounded-xl text-white font-bold flex justify-center items-center gap-2 bg-emerald-600 hover:bg-emerald-700 active:scale-95 transition-all shadow-lg disabled:opacity-30"><Icon name="send" /> ส่งข้อมูลแยกจ้าว</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="p-8 space-y-10 max-w-2xl mx-auto min-h-[500px]">
                                <h2 className="text-3xl font-black text-slate-800 border-b-4 border-indigo-100 pb-4 flex items-center gap-3 font-bold"><Icon name="settings" className="text-indigo-600" /> ตั้งค่าระบบ</h2>
                                <div className="space-y-4"><label className="text-sm font-black text-slate-500 uppercase tracking-widest block font-bold">Web App URL (Google Script)</label><input value={sheetUrl} onChange={e => setSheetUrl(e.target.value)} className="w-full p-4 bg-white border-2 border-indigo-100 rounded-2xl font-mono text-xs outline-none focus:ring-4 focus:ring-indigo-500/10" /></div>
                                <div className="space-y-6 pt-6 border-t-2 border-slate-100">
                                    <div className="flex justify-between items-center"><h3 className="text-xl font-black text-slate-800 uppercase tracking-tight font-bold">รายชื่อจ้าว & ล็อกเลขปิด (Smart Block)</h3><button onClick={addReceiver} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg flex items-center gap-2 font-bold"><Icon name="user-plus" size={16}/> เพิ่มจ้าวใหม่</button></div>
                                    <div className="space-y-8 font-bold">
                                        {receivers.map(r => (
                                            <div key={r.id} className="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100 space-y-4 shadow-sm">
                                                <div className="flex justify-between items-center border-b pb-3 font-bold"><span className="text-lg font-black text-indigo-700">{r.name}</span><button onClick={() => receivers.length > 1 && setReceivers(receivers.filter(x => x.id !== r.id))} className="text-rose-400 hover:text-rose-600 transition-colors"><Icon name="trash-2" size={20}/></button></div>
                                                <div className="space-y-3">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-bold">เพิ่มเลขปิด (ระบบจะกลับเลขให้อัตโนมัติ):</label>
                                                    <div className="flex gap-2">
                                                        <input id={`input-${r.id}`} type="number" placeholder="เช่น 123 หรือ 45" className="flex-grow p-3 bg-white border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 text-lg font-mono font-bold shadow-inner" />
                                                        <button onClick={() => { 
                                                            const v = document.getElementById(`input-${r.id}`).value; 
                                                            if(v) addBlockedNumberSmart(r.id, v); 
                                                            document.getElementById(`input-${r.id}`).value = ''; 
                                                        }} className="bg-slate-800 text-white px-6 rounded-xl font-bold active:scale-95 transition-all font-bold">ล็อกเลข</button>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2 pt-2 font-bold">
                                                        {r.blockedNumbers.map(num => (
                                                            <div key={num} className="bg-white px-2 py-1 rounded-lg border-2 border-rose-50 text-rose-600 font-mono font-black text-xs flex items-center gap-2 group shadow-sm transition-all hover:border-rose-200">
                                                                {num}
                                                                <button onClick={() => setReceivers(receivers.map(x => x.id === r.id ? {...x, blockedNumbers: x.blockedNumbers.filter(z => z !== num)} : x))}><Icon name="x" size={14} className="text-slate-300 group-hover:text-rose-500"/></button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {showPreview && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm overflow-y-auto">
                                <div className="bg-white rounded-3xl w-full max-w-4xl shadow-2xl relative flex flex-col max-h-[90vh]">
                                    <div className="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-3xl font-bold"><h2 className="font-black text-slate-700 flex items-center gap-2 font-bold"><Icon name="eye" size={20} className="text-indigo-600" /> พรีวิวรายงานสรุป (Compact)</h2><button onClick={() => setShowPreview(false)} className="p-2 hover:bg-slate-200 rounded-full text-slate-400 transition-colors"><Icon name="x" size={24} /></button></div>
                                    <div className="flex-grow overflow-y-auto p-4 md:p-10 bg-slate-100 custom-scrollbar">
                                        <div className="bg-white p-4 md:p-8 shadow-sm rounded-lg mx-auto max-w-[800px] border border-slate-200">
                                            <div className="border-b-2 border-indigo-700 pb-2 mb-4 flex justify-between items-end font-bold">
                                                <div><h1 className="text-xl font-black text-indigo-700 leading-tight">สรุปรายการหวยรวมจ้าว</h1><p className="text-slate-500 font-bold tracking-widest uppercase text-[9px]">Consolidated Report (Compact)</p></div>
                                                <div className="text-right text-slate-400 font-bold uppercase text-[9px]">พิมพ์เมื่อ: {new Date().toLocaleString('th-TH')}</div>
                                            </div>
                                            <table className="w-full mb-6 text-xs border-collapse">
                                                <thead><tr className="bg-slate-50 border-b border-slate-200 font-bold"><th className="p-2 text-left">#</th><th className="p-2 text-left">ตัวเลข/รายละเอียด</th><th className="p-2 text-left">ประเภท / จ้าว</th><th className="p-2 text-right">ราคา</th></tr></thead>
                                                <tbody>
                                                    {entries.map((item, index) => (
                                                        <tr key={item.id} className="border-b border-slate-50">
                                                            <td className="p-1.5 text-slate-400 font-bold">{index + 1}</td>
                                                            <td className="p-1.5 font-mono font-black text-lg leading-none">{item.displayValue}</td>
                                                            <td className="p-1.5">
                                                                <div><div className="text-indigo-600 text-[9px] uppercase font-bold">{item.typeName}</div><div className="text-slate-400 text-[8px] font-bold italic">To: {item.receiverName}</div></div>
                                                            </td>
                                                            <td className="p-1.5 text-right font-black text-base">฿{item.price.toLocaleString()}</td>
                                                        </tr>
                                                    ))}
                                                    <tr className="bg-indigo-50 font-black border-t-2 border-indigo-200">
                                                        <td colSpan="3" className="p-3 text-right text-indigo-900 text-sm uppercase font-bold">รวมยอดสุทธิทั้งสิ้น</td>
                                                        <td className="p-3 text-right text-indigo-700 text-xl underline decoration-double font-bold font-black">฿{totalPrice.toLocaleString()}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="p-4 border-t bg-white rounded-b-3xl flex flex-col md:flex-row gap-3 font-bold"><button onClick={() => setShowPreview(false)} className="flex-1 py-4 font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-2xl transition-all">กลับไปแก้ไข</button><button onClick={startExportPDF} disabled={isGeneratingPDF} className={`flex-[2] py-4 rounded-2xl text-white font-black flex justify-center items-center gap-2 shadow-xl ${isGeneratingPDF ? 'bg-slate-400' : 'bg-indigo-600 hover:bg-indigo-700'}`}>{isGeneratingPDF ? <Icon name="loader" className="animate-spin" /> : <><Icon name="download" /> ยืนยันดาวน์โหลด PDF</>}</button></div>
                                </div>
                            </div>
                        )}

                        <div id="pdf-render-zone">
                            {isGeneratingPDF && pdfExportData.chunks[pdfExportData.currentIndex] && (
                                <div className="pdf-page-container">
                                    <div style={{ borderBottom: '3px solid #4338ca', paddingBottom: '10px', marginBottom: '15px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                                        <div>
                                            <h1 style={{ fontSize: '24px', fontWeight: '900', color: '#4338ca', margin: '0' }}>รายงานหวยรวมจ้าว (Compact)</h1>
                                            <p style={{ color: '#64748b', fontWeight: 'bold', margin: '3px 0 0 0', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '10px' }}>Receiver Management System &bull; Professional Edition</p>
                                        </div>
                                        <div style={{ textAlign: 'right', color: '#94a3b8', fontSize: '11px', fontWeight: 'bold' }}>หน้า {pdfExportData.currentIndex + 1} / {pdfExportData.chunks.length} | {new Date().toLocaleString('th-TH')}</div>
                                    </div>
                                    <table className="pdf-table">
                                        <thead><tr><th style={{width: '40px'}}>#</th><th>ตัวเลข/รายละเอียด</th><th>ประเภท / จ้าว</th><th style={{ textAlign: 'right' }}>ราคา (บาท)</th></tr></thead>
                                        <tbody>
                                            {pdfExportData.chunks[pdfExportData.currentIndex].map((item, index) => (
                                                <tr key={item.id}>
                                                    <td style={{ color: '#94a3b8', fontWeight: 'bold' }}>{(pdfExportData.currentIndex * 35) + index + 1}</td>
                                                    <td style={{ fontSize: '18px', fontWeight: 'bold', fontFamily: 'JetBrains Mono', color: '#1e293b' }}>{item.displayValue}</td>
                                                    <td>
                                                        <div style={{ color: '#4338ca', fontWeight: 'bold', fontSize: '11px', textTransform: 'uppercase' }}>{item.typeName}</div>
                                                        <div style={{ color: '#94a3b8', fontSize: '10px' }}>ส่ง: {item.receiverName}</div>
                                                    </td>
                                                    <td style={{ textAlign: 'right', fontSize: '16px', fontWeight: 'bold', color: '#0f172a' }}>{item.price.toLocaleString()}</td>
                                                </tr>
                                            ))}
                                            {pdfExportData.currentIndex === pdfExportData.chunks.length - 1 && (
                                                <tr className="pdf-total-row">
                                                    <td colSpan="3" style={{ textAlign: 'right', padding: '15px 10px', fontSize: '16px', color: '#312e81', borderTop: '2px solid #4338ca' }}>ยอดรวมสุทธิทั้งสิ้น</td>
                                                    <td style={{ textAlign: 'right', padding: '15px 10px', fontSize: '24px', color: '#4338ca', borderTop: '2px solid #4338ca', borderBottom: '4px double #4338ca' }}>฿{totalPrice.toLocaleString()}</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                    <div style={{ marginTop: '20px', textAlign: 'center', fontSize: '9px', color: '#cbd5e1', letterSpacing: '3px', fontWeight: 'bold', textTransform: 'uppercase' }}>Smart Data Matrix Sync &bull; 2026 Edition</div>
                                </div>
                            )}
                        </div>

                        <footer className="p-6 bg-slate-50 text-center text-[10px] text-slate-400 font-black uppercase tracking-[0.5em] border-t-2 border-slate-100 font-bold">Smart Data Sync &bull; Professional Management &bull; 2026</footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

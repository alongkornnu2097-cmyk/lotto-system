<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงตัวเลขหวย - Professional</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [entries, setEntries] = useState([]);
            const [blockedNumbers, setBlockedNumbers] = useState([]); // เริ่มต้นด้วยค่าว่างเพื่อให้กรอกใหม่ทุกงวด
            const [number, setNumber] = useState('');
            const [price, setPrice] = useState('');
            const [type, setType] = useState('3-direct');
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('entry');
            const [isSaving, setIsSaving] = useState(false);
            
            const [sheetUrl, setSheetUrl] = useState('https://script.google.com/macros/s/AKfycbxmTp_gZ7iJf8ixFNRVxnNr8yoPI2f6flxZ71hUZdwSbfcZb8KUvpViB8GvySHxIKRN/exec');

            const typeList = [
                { id: '3-direct', label: '3 ตัวตรง' },
                { id: '3-permute', label: '3 ตัวกลับ' },
                { id: '2-todd', label: '2 ตัวโต๊ด' },
                { id: '2-top', label: '2 ตัวบน' },
                { id: '2-top-permute', label: '2 ตัวบนกลับ' },
                { id: '2-bottom', label: '2 ตัวล่าง' },
                { id: '2-bottom-permute', label: '2 ตัวล่างกลับ' },
                { id: 'top-float', label: 'ตัวลอยบน' },
                { id: 'bottom-float', label: 'ตัวลอยล่าง' },
                { id: 'pack-4', label: 'แพ 4 ตัว' },
                { id: 'pack-5', label: 'แพ 5 ตัว' }
            ];

            const getPermutations = (str) => {
                if (!str || typeof str !== 'string') return [];
                if (str.length <= 1) return [str];
                const perms = [];
                for (let i = 0; i < str.length; i++) {
                    const char = str[i];
                    const remainingChars = str.slice(0, i) + str.slice(i + 1);
                    for (const p of getPermutations(remainingChars)) {
                        perms.push(char + p);
                    }
                }
                return [...new Set(perms)]; 
            };

            const showAlert = (msg, type = 'error') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleAddEntry = (e) => {
                e.preventDefault();
                if (!number || !price) {
                    showAlert('กรุณากรอกตัวเลขและราคา');
                    return;
                }

                const inputPerms = getPermutations(number);
                const hitBlock = inputPerms.find(p => blockedNumbers.includes(p));

                if (hitBlock) {
                    showAlert(`เลขชุดนี้ติดตัวปิดของงวดนี้: ${hitBlock}`, 'error');
                    return;
                }

                let newItems = [];
                const priceParts = price.toLowerCase().split(/[x*]/);
                const mainPrice = parseFloat(priceParts[0]);
                const subPrice = priceParts.length > 1 ? parseFloat(priceParts[1]) : mainPrice;
                const isPermute = ['3-permute', '2-top-permute', '2-bottom-permute'].includes(type);

                if (isPermute) {
                    const perms = getPermutations(number);
                    const selectedType = typeList.find(t => t.id === type);
                    newItems = perms.map((p) => {
                        const itemPrice = (p === number) ? mainPrice : subPrice;
                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            number: p,
                            type: selectedType.label,
                            price: itemPrice,
                            isPrimary: p === number
                        };
                    });
                } else {
                    const selectedType = typeList.find(t => t.id === type);
                    newItems = [{
                        id: Math.random().toString(36).substr(2, 9),
                        number,
                        type: selectedType ? selectedType.label : 'ทั่วไป',
                        price: mainPrice,
                        isPrimary: true
                    }];
                }

                setEntries([...entries, ...newItems]);
                setNumber('');
                setPrice('');
                showAlert('เพิ่มรายการสำเร็จ', 'success');
            };

            const saveToGoogleSheets = async () => {
                if (entries.length === 0) return;
                setIsSaving(true);
                try {
                    await fetch(sheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        body: JSON.stringify({ entries: entries })
                    });
                    showAlert('บันทึกลง Google Sheets สำเร็จ!', 'success');
                    setEntries([]); 
                } catch (error) {
                    showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
                } finally {
                    setIsSaving(false);
                }
            };

            const totalPrice = useMemo(() => entries.reduce((sum, item) => sum + item.price, 0), [entries]);

            const clearBlockedNumbers = () => {
                if (window.confirm('คุณต้องการล้างรายการเลขปิดทั้งหมดของงวดนี้ใช่หรือไม่?')) {
                    setBlockedNumbers([]);
                    showAlert('ล้างรายการเลขปิดแล้ว', 'success');
                }
            };

            return (
                <div className="min-h-screen p-2 md:p-8">
                    <div className="max-w-4xl mx-auto shadow-2xl rounded-2xl overflow-hidden bg-white">
                        <header className="bg-indigo-700 text-white p-5 md:p-6 flex justify-between items-center">
                            <div>
                                <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2">
                                    <Icon name="target" /> ระบบลงหวยอัจฉริยะ
                                </h1>
                                <p className="text-[10px] md:text-xs text-indigo-200 uppercase tracking-widest mt-1">Smart Block & Multi-Price Sync</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setActiveTab('entry')} className={`p-2 rounded-xl transition-all ${activeTab === 'entry' ? 'bg-white text-indigo-700 shadow-lg' : 'hover:bg-indigo-600'}`}><Icon name="list" size={20}/></button>
                                <button onClick={() => setActiveTab('settings')} className={`p-2 rounded-xl transition-all ${activeTab === 'settings' ? 'bg-white text-indigo-700 shadow-lg' : 'hover:bg-indigo-600'}`}><Icon name="settings" size={20}/></button>
                            </div>
                        </header>

                        {notification && (
                            <div className={`fixed top-4 right-4 z-50 p-4 rounded-2xl shadow-2xl text-white font-bold transition-all transform animate-bounce flex items-center gap-3 ${notification.type === 'error' ? 'bg-red-500' : 'bg-green-600'}`}>
                                <Icon name={notification.type === 'error' ? 'shield-alert' : 'check-circle-2'} size={24} />
                                <span>{notification.msg}</span>
                            </div>
                        )}

                        {activeTab === 'entry' ? (
                            <div className="grid md:grid-cols-2 divide-x divide-slate-100 min-h-[500px]">
                                <div className="p-5 md:p-8 space-y-6">
                                    <form onSubmit={handleAddEntry} className="space-y-5">
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                            {typeList.map(t => (
                                                <button 
                                                    key={t.id} 
                                                    type="button" 
                                                    onClick={() => { setType(t.id); setNumber(''); }} 
                                                    className={`p-2 text-[10px] md:text-[11px] rounded-xl border-2 transition-all ${type === t.id ? 'bg-indigo-600 text-white border-indigo-600 shadow-md font-bold' : 'bg-slate-50 border-slate-100 text-slate-500 hover:border-indigo-200'}`}
                                                >
                                                    {t.label}
                                                </button>
                                            ))}
                                        </div>
                                        
                                        <div className="flex gap-4">
                                            <div className="w-1/2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block tracking-wider">ตัวเลข</label>
                                                <input 
                                                    type="number" 
                                                    value={number} 
                                                    onChange={e => setNumber(e.target.value)} 
                                                    placeholder="เลข" 
                                                    className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-3xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-center" 
                                                />
                                            </div>
                                            <div className="w-1/2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block tracking-wider">
                                                    ราคา {['3-permute', '2-top-permute', '2-bottom-permute'].includes(type) && <span className="text-indigo-500">(เช่น 100x20)</span>}
                                                </label>
                                                <input 
                                                    type="text" 
                                                    value={price} 
                                                    onChange={e => setPrice(e.target.value)} 
                                                    placeholder="0" 
                                                    className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-3xl outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-center font-bold text-indigo-700" 
                                                />
                                            </div>
                                        </div>

                                        <button className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-100 transition-all transform active:scale-[0.97] flex items-center justify-center gap-3">
                                            <Icon name="plus" size={24} />
                                            เพิ่มรายการลงตาราง
                                        </button>
                                    </form>

                                    <div className="bg-rose-50 p-5 rounded-2xl border-2 border-rose-100 shadow-sm">
                                        <div className="flex items-center gap-2 text-rose-800 font-bold mb-3">
                                            <Icon name="lock" size={18} />
                                            <span className="text-xs uppercase tracking-tight">รายการเลขปิดของงวดนี้:</span>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {blockedNumbers.length > 0 ? (
                                                blockedNumbers.map(n => <span key={n} className="bg-white px-3 py-1 rounded-lg border border-rose-200 text-xs font-mono font-black text-rose-600 shadow-sm">{n}</span>)
                                            ) : (
                                                <span className="text-xs text-rose-400 italic">ยังไม่มีการตั้งเลขปิดสำหรับงวดนี้</span>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="p-0 bg-slate-50/30 flex flex-col h-[600px] md:h-auto">
                                    <div className="p-6 pb-2 flex justify-between items-center">
                                        <h3 className="font-black text-slate-800 flex items-center gap-2">
                                            <Icon name="shopping-cart" size={18} className="text-indigo-500" />
                                            สรุปยอด ({entries.length})
                                        </h3>
                                        {entries.length > 0 && (
                                            <button onClick={() => setEntries([])} className="text-[10px] text-rose-500 font-bold hover:bg-rose-50 px-3 py-1 rounded-full transition-colors uppercase tracking-widest border border-rose-100">ล้างรายการ</button>
                                        )}
                                    </div>

                                    <div className="flex-grow overflow-y-auto space-y-2 p-6 custom-scrollbar">
                                        {entries.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 py-20">
                                                <Icon name="box" size={80} className="opacity-10" />
                                                <p className="text-sm font-bold uppercase tracking-widest">ว่างเปล่า</p>
                                            </div>
                                        ) : (
                                            entries.map(item => (
                                                <div key={item.id} className={`bg-white p-4 rounded-2xl border-2 flex justify-between items-center shadow-sm transition-all animate-in slide-in-from-right duration-300 ${item.isPrimary ? 'border-indigo-200 ring-2 ring-indigo-50' : 'border-slate-100'}`}>
                                                    <div className="flex flex-col">
                                                        <div className={`font-mono font-black text-2xl tracking-tighter leading-none ${item.isPrimary ? 'text-indigo-700' : 'text-slate-800'}`}>
                                                            {item.number}
                                                        </div>
                                                        <div className="text-[9px] text-indigo-500 font-black uppercase tracking-widest mt-1">
                                                            {item.type} {item.isPrimary && ['3 ตัวกลับ', '2 ตัวบนกลับ', '2 ตัวล่างกลับ'].includes(item.type) && '(หลัก)'}
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-5">
                                                        <span className={`font-black text-lg ${item.isPrimary ? 'text-indigo-600' : 'text-slate-700'}`}>
                                                            ฿{item.price.toLocaleString()}
                                                        </span>
                                                        <button onClick={() => setEntries(entries.filter(e => e.id !== item.id))} className="text-slate-300 hover:text-rose-500 transition-colors">
                                                            <Icon name="trash-2" size={20} />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                    <div className="p-6 bg-white border-t-2 border-slate-100 rounded-b-2xl">
                                        <div className="flex justify-between items-end mb-6">
                                            <span className="text-xs text-slate-400 font-bold uppercase tracking-widest">ยอดรวมสุทธิ</span>
                                            <span className="text-4xl font-black text-indigo-900 leading-none">฿{totalPrice.toLocaleString()}</span>
                                        </div>
                                        <button 
                                            onClick={saveToGoogleSheets} 
                                            disabled={isSaving || entries.length === 0} 
                                            className={`w-full py-5 rounded-2xl text-white font-black flex justify-center items-center gap-3 transition-all shadow-2xl ${isSaving || entries.length === 0 ? 'bg-slate-300 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-100 active:scale-95'}`}
                                        >
                                            {isSaving ? (
                                                <><Icon name="loader" className="animate-spin" /> กำลังบันทึก...</>
                                            ) : (
                                                <><Icon name="send" size={24} /> บันทึกลง Google Sheet</>
                                            )}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="p-8 space-y-10 max-w-2xl mx-auto min-h-[550px]">
                                <h2 className="text-3xl font-black text-slate-800 border-b-4 border-indigo-100 pb-4 flex items-center gap-3">
                                    <Icon name="settings-2" className="text-indigo-600" size={32} />
                                    การตั้งค่า
                                </h2>
                                
                                <div className="space-y-4">
                                    <label className="text-sm font-black text-slate-500 flex items-center gap-2 uppercase tracking-widest">
                                        <Icon name="link-2" size={20} className="text-emerald-500" />
                                        URL ของ Google Sheets
                                    </label>
                                    <input value={sheetUrl} onChange={e => setSheetUrl(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-xs focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" />
                                </div>

                                <div className="space-y-5 pt-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <label className="text-sm font-black text-slate-500 flex items-center gap-2 uppercase tracking-widest">
                                                <Icon name="shield-off" size={20} className="text-rose-500" />
                                                จัดการเลขปิด (ประจำงวด)
                                            </label>
                                            <p className="text-[10px] text-slate-400 mt-2 font-bold">* ใส่เพียงเลขเดียว ระบบจะล็อกชุดสลับให้อัตโนมัติ</p>
                                        </div>
                                        <button 
                                            onClick={clearBlockedNumbers}
                                            className="text-[10px] font-black text-rose-600 border border-rose-200 px-3 py-1 rounded-lg hover:bg-rose-50 transition-colors uppercase tracking-widest"
                                        >
                                            ล้างเลขปิดทั้งหมด
                                        </button>
                                    </div>
                                    <div className="flex gap-3">
                                        <input id="new-block-input" type="number" placeholder="กรอกเลขที่ต้องการปิด" className="flex-grow p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-rose-500/10 font-mono text-xl" />
                                        <button onClick={() => {
                                            const v = document.getElementById('new-block-input').value;
                                            if(v) setBlockedNumbers([...blockedNumbers, v]);
                                            document.getElementById('new-block-input').value = '';
                                        }} className="bg-rose-600 hover:bg-rose-700 text-white px-8 rounded-2xl font-black transition-all shadow-lg active:scale-95">เพิ่ม</button>
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4">
                                        {blockedNumbers.map(n => (
                                            <div key={n} className="bg-white text-rose-600 px-4 py-3 rounded-2xl font-black border-2 border-rose-50 flex justify-between items-center group shadow-sm transition-all hover:border-rose-200">
                                                <span className="font-mono text-xl tracking-tighter">{n}</span>
                                                <button onClick={() => setBlockedNumbers(blockedNumbers.filter(x => x !== n))} className="text-slate-300 hover:text-rose-600 transition-colors">
                                                    <Icon name="x-circle" size={18} />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        <footer className="p-6 bg-slate-50 text-center text-[10px] text-slate-400 font-black uppercase tracking-[0.4em] border-t-2 border-slate-100">
                            Professional Lotto Management &bull; Cloud Edition &bull; 2026
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

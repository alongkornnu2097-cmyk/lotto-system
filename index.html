<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงตัวเลขหวย - Professional Management</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        #pdf-render-zone { 
            position: absolute; 
            left: -9999px; 
            top: -9999px; 
            width: 750px; 
            background: #ffffff; 
        }
        .pdf-page-container {
            padding: 30px 40px;
            background: #ffffff;
            color: #000000;
        }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .pdf-table th { background: #f8fafc; padding: 6px 8px; text-align: left; border-bottom: 1px solid #cbd5e1; font-size: 13px; font-weight: bold; color: #1e293b; }
        .pdf-table td { padding: 4px 8px; border-bottom: 1px solid #f1f5f9; font-size: 12px; line-height: 1.2; }
        .pdf-total-row { background: #f5f3ff !important; font-weight: bold; border-top: 1.5px solid #4338ca; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [receivers, setReceivers] = useState([
                { id: 'r1', name: 'พี่อ้อม', blockedNumbers: [] },
                { id: 'r2', name: 'น้าไก่', blockedNumbers: [] }
            ]);
            const [activeReceiverId, setActiveReceiverId] = useState('r1');
            const [entries, setEntries] = useState([]);
            const [number, setNumber] = useState('');
            const [price, setPrice] = useState('');
            const [type, setType] = useState('3-direct');
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('entry'); // 'entry', 'dashboard', 'settings'
            const [isSaving, setIsSaving] = useState(false);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [showPreview, setShowPreview] = useState(false);
            const [pdfExportData, setPdfExportData] = useState({ chunks: [], currentIndex: -1 });
            const [pdfInstance, setPdfInstance] = useState(null);
            
            const [sheetUrl, setSheetUrl] = useState('https://script.google.com/macros/s/AKfycbxmTp_gZ7iJf8ixFNRVxnNr8yoPI2f6flxZ71hUZdwSbfcZb8KUvpViB8GvySHxIKRN/exec');

            const activeReceiver = useMemo(() => 
                receivers.find(r => r.id === activeReceiverId) || receivers[0]
            , [receivers, activeReceiverId]);

            const typeList = [
                { id: '3-direct', label: '3 ตัวตรง' },
                { id: '3-permute', label: '3 ตัวกลับ' },
                { id: '2-top', label: '2 ตัวบน' },
                { id: '2-top-permute', label: '2 ตัวบนกลับ' },
                { id: '2-bottom', label: '2 ตัวล่าง' },
                { id: '2-bottom-permute', label: '2 ตัวล่างกลับ' },
                { id: '2-todd', label: '2 ตัวโต๊ด' },
                { id: 'top-float', label: 'ลอยบน' },
                { id: 'bottom-float', label: 'ลอยล่าง' },
                { id: 'pack-4', label: 'แพ 4 ตัว' },
                { id: 'pack-5', label: 'แพ 5 ตัว' }
            ];

            const getPermutations = (str) => {
                if (!str || typeof str !== 'string') return [];
                if (str.length <= 1) return [str];
                const perms = [];
                for (let i = 0; i < str.length; i++) {
                    const char = str[i];
                    const remainingChars = str.slice(0, i) + str.slice(i + 1);
                    for (const p of getPermutations(remainingChars)) perms.push(char + p);
                }
                return [...new Set(perms)]; 
            };

            const showAlert = (msg, alertType = 'error') => {
                setNotification({ msg, type: alertType });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleAddEntry = (e) => {
                e.preventDefault();
                if (!number || !price) { showAlert('กรุณากรอกตัวเลขและราคา'); return; }

                const perms = getPermutations(number);
                const hitBlock = perms.find(p => activeReceiver.blockedNumbers.includes(p));
                
                if (hitBlock) {
                    showAlert(`เลขชุดนี้ติดเลขปิดของ [${activeReceiver.name}]: ${hitBlock}`, 'error');
                    return;
                }

                const priceParts = price.toLowerCase().split(/[x*]/);
                const isPermuteType = ['3-permute', '2-top-permute', '2-bottom-permute'].includes(type);

                let newItems = [];
                const selectedType = typeList.find(t => t.id === type) || { label: 'ทั่วไป' };

                if (isPermuteType) {
                    const p1 = parseFloat(priceParts[0]);
                    const p2 = priceParts.length > 1 ? parseFloat(priceParts[1]) : p1;
                    
                    let mainPrice, subPrice;
                    
                    if (priceParts.length > 1 && p2 === perms.length) {
                        mainPrice = p1;
                        subPrice = p1;
                    } else {
                        mainPrice = p1;
                        subPrice = p2;
                    }

                    newItems = perms.map(p => {
                        const itemPrice = (p === number) ? mainPrice : subPrice;
                        const itemDisplay = `${p}=${itemPrice}`;
                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            number: p,
                            typeId: type,
                            typeName: selectedType.label,
                            displayValue: itemDisplay,
                            price: itemPrice,
                            isPrimary: p === number,
                            receiverName: activeReceiver.name,
                            details: itemDisplay
                        };
                    });
                } else {
                    let totalInputPrice = parseFloat(priceParts[0]) || 0;
                    if (priceParts.length > 1) {
                        const p2 = parseFloat(priceParts[1]) || 0;
                        if (p2 < 10) {
                            totalInputPrice = totalInputPrice * p2;
                        } else {
                            totalInputPrice = totalInputPrice + p2;
                        }
                    }

                    const formattedDetails = `${number}=${price}`;

                    newItems = [{
                        id: Math.random().toString(36).substr(2, 9),
                        number,
                        typeId: type,
                        typeName: selectedType.label,
                        displayValue: formattedDetails,
                        price: totalInputPrice,
                        isPrimary: true,
                        receiverName: activeReceiver.name,
                        details: formattedDetails
                    }];
                }

                setEntries([...entries, ...newItems]);
                setNumber('');
                setPrice('');
                showAlert(`เพิ่มรายการให้ [${activeReceiver.name}] เรียบร้อย`, 'success');
            };

            const addBlockedNumberSmart = (rid, val) => {
                if (!val) return;
                const perms = getPermutations(val);
                setReceivers(receivers.map(r => {
                    if (r.id === rid) {
                        const updatedBlocks = [...new Set([...r.blockedNumbers, ...perms])];
                        return { ...r, blockedNumbers: updatedBlocks };
                    }
                    return r;
                }));
                showAlert(`ล็อกเลข ${val} และเลขสลับตำแหน่งให้ [${receivers.find(x => x.id === rid).name}] แล้ว`, 'success');
            };

            // FEATURE 3: Copy to LINE function
            const copyToClipboard = () => {
                if (entries.length === 0) {
                    showAlert('ไม่มีรายการให้คัดลอก', 'error');
                    return;
                }
                
                let text = `📝 สรุปรายการหวย\nจ้าว: ${activeReceiver.name}\n------------------\n`;
                entries.forEach(e => {
                    text += `${e.displayValue} (${e.typeName})\n`;
                });
                text += `------------------\n💰 ยอดรวม: ${totalPrice.toLocaleString()} บาท\n`;

                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                try {
                    document.execCommand('copy');
                    showAlert('คัดลอกข้อความสำหรับส่ง LINE เรียบร้อย!', 'success');
                } catch (err) {
                    showAlert('ไม่สามารถคัดลอกได้', 'error');
                }
                
                document.body.removeChild(textArea);
            };

            const saveToGoogleSheets = async () => {
                if (entries.length === 0) return;
                setIsSaving(true);
                try {
                    await fetch(sheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        body: JSON.stringify({ entries: entries })
                    });
                    showAlert('บันทึกข้อมูลลงชีตสำเร็จ!', 'success');
                    setEntries([]); 
                } catch (error) {
                    showAlert('การเชื่อมต่อผิดพลาด');
                } finally {
                    setIsSaving(false);
                }
            };

            const chunkArray = (array, size) => {
                const chunks = [];
                for (let i = 0; i < array.length; i += size) {
                    chunks.push(array.slice(i, i + size));
                }
                return chunks;
            };

            const startExportPDF = () => {
                if (entries.length === 0) return;
                setIsGeneratingPDF(true);
                const chunks = chunkArray(entries, 35); 
                setPdfExportData({ chunks, currentIndex: 0 });
            };

            useEffect(() => {
                if (isGeneratingPDF && pdfExportData.currentIndex >= 0) {
                    processPdfPage();
                }
            }, [pdfExportData.currentIndex, isGeneratingPDF]);

            const processPdfPage = async () => {
                const { chunks, currentIndex } = pdfExportData;
                const element = document.getElementById('pdf-render-zone');
                try {
                    await new Promise(r => setTimeout(r, 1500)); 
                    const canvas = await html2canvas(element, { scale: 3, useCORS: true, backgroundColor: "#ffffff" });
                    const imgData = canvas.toDataURL('image/png');
                    let currentPdf = pdfInstance;
                    if (currentIndex === 0) {
                        currentPdf = new jspdf.jsPDF('p', 'mm', 'a4');
                    } else {
                        currentPdf.addPage();
                    }
                    const pdfWidth = currentPdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    currentPdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);

                    if (currentIndex < chunks.length - 1) {
                        setPdfInstance(currentPdf);
                        setPdfExportData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 }));
                    } else {
                        currentPdf.save(`Report-${new Date().getTime()}.pdf`);
                        showAlert('ดาวน์โหลด PDF สำเร็จ', 'success');
                        resetPdfExport();
                    }
                } catch (err) { showAlert('สร้าง PDF ไม่สำเร็จ'); resetPdfExport(); }
            };

            const resetPdfExport = () => {
                setIsGeneratingPDF(false);
                setShowPreview(false);
                setPdfExportData({ chunks: [], currentIndex: -1 });
                setPdfInstance(null);
            };

            const totalPrice = useMemo(() => entries.reduce((sum, item) => sum + item.price, 0), [entries]);

            // FEATURE 2: Dashboard/Summary Data Computed Property
            const summaryByNumber = useMemo(() => {
                const summary = {};
                entries.forEach(e => {
                    if (!summary[e.number]) {
                        summary[e.number] = { number: e.number, total: 0, items: [], types: {} };
                    }
                    summary[e.number].total += e.price;
                    summary[e.number].items.push(e);
                    
                    // รวมยอดแยกตามประเภทของตัวเลข
                    if (!summary[e.number].types[e.typeName]) {
                        summary[e.number].types[e.typeName] = 0;
                    }
                    summary[e.number].types[e.typeName] += e.price;
                });
                return Object.values(summary).sort((a, b) => b.total - a.total);
            }, [entries]);

            const addReceiver = () => {
                const name = prompt('กรุณาระบุชื่อจ้าวใหม่:');
                if (name) {
                    setReceivers([...receivers, { id: 'r' + Date.now(), name, blockedNumbers: [] }]);
                }
            };

            return (
                <div className="min-h-screen p-3 md:p-6 lg:p-10 bg-[#f8fafc] text-slate-800 font-sans">
                    <div className="max-w-[1200px] mx-auto bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden flex flex-col min-h-[85vh]">
                        
                        {/* Modern Header */}
                        <header className="px-6 py-5 md:px-10 md:py-6 flex flex-col md:flex-row justify-between items-center border-b border-slate-100 gap-4 bg-white z-10 relative">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center shadow-sm">
                                    <Icon name="layout-dashboard" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-bold tracking-tight text-slate-900">ระบบลงหวยอัจฉริยะ</h1>
                                    <p className="text-xs text-slate-500 font-medium mt-0.5 tracking-wide">Professional Management System</p>
                                </div>
                            </div>
                            
                            {/* Modern Tab Bar */}
                            <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                <button onClick={() => setActiveTab('entry')} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 ${activeTab === 'entry' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'}`}>
                                    <Icon name="edit-3" size={18}/> <span className="hidden sm:inline">ลงหวย</span>
                                </button>
                                <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 ${activeTab === 'dashboard' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'}`}>
                                    <Icon name="pie-chart" size={18}/> <span className="hidden sm:inline">สรุปยอด</span>
                                </button>
                                <button onClick={() => setActiveTab('settings')} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 ${activeTab === 'settings' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'}`}>
                                    <Icon name="settings" size={18}/> <span className="hidden sm:inline">ตั้งค่า</span>
                                </button>
                            </div>
                        </header>

                        {/* Notifications */}
                        {notification && (
                            <div className={`fixed top-6 right-6 z-[200] px-6 py-4 rounded-2xl shadow-xl font-medium animate-bounce flex items-center gap-3 backdrop-blur-md ${notification.type === 'error' ? 'bg-rose-500/90 text-white' : 'bg-emerald-500/90 text-white'}`}>
                                <Icon name={notification.type === 'error' ? 'alert-circle' : 'check-circle-2'} size={24} />
                                <span>{notification.msg}</span>
                            </div>
                        )}

                        {/* Content Area */}
                        <div className="flex-grow flex flex-col relative">
                            {activeTab === 'entry' && (
                                <div className="grid md:grid-cols-12 flex-grow h-full">
                                    {/* Left: Input Form */}
                                    <div className="md:col-span-7 p-5 md:p-8 lg:p-10 space-y-6 md:space-y-8 overflow-y-auto custom-scrollbar">
                                        
                                        {/* Receiver Selection */}
                                        <div className="space-y-3">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">เลือกจ้าวที่ส่ง</label>
                                            <div className="flex flex-wrap gap-2">
                                                {receivers.map(r => (
                                                    <button key={r.id} onClick={() => setActiveReceiverId(r.id)} className={`px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 border-2 ${activeReceiverId === r.id ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-100 bg-white text-slate-500 hover:border-slate-200 hover:bg-slate-50'}`}>
                                                        {r.name}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Main Form */}
                                        <form onSubmit={handleAddEntry} className="space-y-6">
                                            <div className="bg-slate-50 p-6 rounded-[24px] border border-slate-100 space-y-6">
                                                {/* Type Selection Grid */}
                                                <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                                    {typeList.map(t => (
                                                        <button key={t.id} type="button" onClick={() => setType(t.id)} className={`py-2 px-1 text-xs sm:text-sm rounded-xl font-semibold transition-all duration-200 ${type === t.id ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}`}>
                                                            {t.label}
                                                        </button>
                                                    ))}
                                                </div>

                                                {/* Input Fields */}
                                                <div className="grid sm:grid-cols-2 gap-4">
                                                    <div className="space-y-2">
                                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">ตัวเลข</label>
                                                        <input type="number" value={number} onChange={e => setNumber(e.target.value)} placeholder="000" className="w-full p-5 bg-white border border-slate-200 rounded-2xl font-mono text-3xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all text-center text-slate-800 shadow-sm" />
                                                    </div>
                                                    <div className="space-y-2">
                                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">ราคา (เช่น 110*50)</label>
                                                        <input type="text" value={price} onChange={e => setPrice(e.target.value)} placeholder="0" className="w-full p-5 bg-white border border-slate-200 rounded-2xl text-3xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all text-center font-bold text-indigo-600 shadow-sm" />
                                                    </div>
                                                </div>

                                                <button className="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg shadow-slate-900/20 hover:shadow-indigo-600/30 flex items-center justify-center gap-2 transition-all duration-300 active:scale-[0.98]">
                                                    <Icon name="plus" size={20} /> เพิ่มรายการลงจ้าว {activeReceiver.name}
                                                </button>
                                            </div>
                                        </form>

                                        {/* Blocked Numbers Warning */}
                                        <div className="bg-amber-50/50 p-5 rounded-[24px] border border-amber-100/60">
                                            <div className="flex items-center gap-2 text-amber-700 font-semibold mb-3 text-sm">
                                                <Icon name="shield-alert" size={16} /> เลขอั้น/ปิดรับของ {activeReceiver.name}
                                            </div>
                                            <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scrollbar">
                                                {activeReceiver.blockedNumbers.length > 0 ? (
                                                    activeReceiver.blockedNumbers.map(n => <span key={n} className="bg-white px-3 py-1.5 rounded-lg border border-amber-200 text-xs font-mono font-bold text-amber-600 shadow-sm">{n}</span>)
                                                ) : (
                                                    <span className="text-xs text-amber-500/70 font-medium">ไม่มีการตั้งเลขอั้นสำหรับจ้าวนี้</span>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Right: Cart/Summary */}
                                    <div className="md:col-span-5 bg-slate-50/80 border-t md:border-t-0 md:border-l border-slate-200 flex flex-col h-[500px] md:h-auto relative">
                                        <div className="p-5 md:p-6 lg:p-8 flex justify-between items-center border-b border-slate-200/60 bg-slate-50/50 backdrop-blur-sm sticky top-0 z-10">
                                            <h3 className="font-bold text-slate-800 flex items-center gap-2 text-lg">
                                                <Icon name="shopping-bag" size={20} className="text-indigo-500" /> ตะกร้ารวม ({entries.length})
                                            </h3>
                                            {entries.length > 0 && <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">รอส่ง</span>}
                                        </div>
                                        
                                        <div className="flex-grow overflow-y-auto p-4 md:p-6 lg:p-8 space-y-3 custom-scrollbar">
                                            {entries.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 space-y-4 py-10">
                                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center"><Icon name="inbox" size={32} className="opacity-50" /></div>
                                                    <p className="text-sm font-medium">ยังไม่มีรายการในตะกร้า</p>
                                                </div>
                                            ) : (
                                                entries.map((item, i) => (
                                                    <div key={item.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100 hover:border-indigo-100 transition-colors group">
                                                        <div className="flex gap-4 items-center">
                                                            <div className="text-xs font-bold text-slate-300 w-4">{i+1}</div>
                                                            <div>
                                                                <div className={`font-mono font-bold text-xl leading-none mb-1.5 ${item.isPrimary ? 'text-indigo-600' : 'text-slate-600'}`}>{item.displayValue}</div>
                                                                <div className="flex gap-2">
                                                                    <span className="text-[10px] text-slate-500 font-medium bg-slate-100 px-2 py-0.5 rounded-md">{item.typeName}</span>
                                                                    <span className="text-[10px] text-indigo-500 font-medium bg-indigo-50 px-2 py-0.5 rounded-md">ส่ง: {item.receiverName}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-4">
                                                            <span className="font-bold text-lg text-slate-800">฿{item.price.toLocaleString()}</span>
                                                            <button onClick={() => setEntries(entries.filter(e => e.id !== item.id))} className="text-slate-300 hover:text-rose-500 hover:bg-rose-50 p-2 rounded-xl transition-all">
                                                                <Icon name="trash-2" size={18} />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                        
                                        {/* Action Buttons Footer */}
                                        <div className="p-5 md:p-6 lg:p-8 bg-white border-t border-slate-200 rounded-b-[32px] md:rounded-bl-none md:rounded-br-[32px] shadow-[0_-4px_20px_rgb(0,0,0,0.02)] z-10">
                                            <div className="flex justify-between items-end mb-4 md:mb-5">
                                                <span className="text-sm text-slate-500 font-medium">ยอดรวมทั้งหมด</span>
                                                <span className="text-2xl lg:text-3xl font-black text-indigo-700 tracking-tight">฿{totalPrice.toLocaleString()}</span>
                                            </div>
                                            <div className="grid grid-cols-3 gap-2">
                                                <button onClick={copyToClipboard} disabled={entries.length === 0} className="group relative overflow-hidden py-3 rounded-xl font-bold text-white flex justify-center items-center gap-1 lg:gap-2 bg-[#00B900] shadow-sm shadow-[#00B900]/20 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-md hover:shadow-[#00B900]/30 active:scale-[0.98] disabled:opacity-50 disabled:hover:translate-y-0 text-[10px] lg:text-xs">
                                                    <Icon name="message-circle" size={16} /> ก๊อปปี้
                                                </button>
                                                <button onClick={() => setShowPreview(true)} disabled={entries.length === 0} className="group relative overflow-hidden py-3 rounded-xl font-bold text-white flex justify-center items-center gap-1 lg:gap-2 bg-slate-800 shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-md active:scale-[0.98] disabled:opacity-50 disabled:hover:translate-y-0 text-[10px] lg:text-xs">
                                                    <Icon name="file-text" size={16} /> ดู PDF
                                                </button>
                                                <button onClick={saveToGoogleSheets} disabled={isSaving || entries.length === 0} className="group relative overflow-hidden py-3 rounded-xl text-indigo-700 bg-indigo-50 font-bold flex justify-center items-center gap-1 lg:gap-2 shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:bg-indigo-100 hover:shadow-md active:scale-[0.98] disabled:opacity-50 disabled:hover:translate-y-0 text-[10px] lg:text-xs">
                                                    {isSaving ? <Icon name="loader" size={16} className="animate-spin" /> : <Icon name="cloud-upload" size={16} />}
                                                    {isSaving ? 'ส่ง...' : 'ลงชีต'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Dashboard Tab */}
                            {activeTab === 'dashboard' && (
                                <div className="p-6 md:p-10 flex-grow bg-slate-50/50">
                                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-3">สรุปยอดรวม (Dashboard)</h2>
                                            <p className="text-sm text-slate-500 mt-1">วิเคราะห์ตัวเลขที่มีการลงบันทึกในระบบทั้งหมด</p>
                                        </div>
                                        <div className="bg-white px-6 py-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-5">
                                            <div className="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600"><Icon name="trending-up" size={20} /></div>
                                            <div>
                                                <span className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">ยอดรวมรับสุทธิ</span>
                                                <span className="text-2xl font-black text-slate-800 leading-none">฿{totalPrice.toLocaleString()}</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                        {summaryByNumber.map(stat => (
                                            <div key={stat.number} className="bg-white p-5 rounded-[20px] shadow-sm border border-slate-100 hover:border-indigo-200 hover:shadow-md transition-all flex flex-col justify-between group">
                                                <div className="flex justify-between items-start mb-3">
                                                    <span className="font-mono text-3xl font-black text-slate-700 group-hover:text-indigo-600 transition-colors">{stat.number}</span>
                                                    <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-lg">{stat.items.length} รายการ</span>
                                                </div>
                                                
                                                {/* Type Breakdown Details */}
                                                <div className="mb-4 space-y-1.5 flex-grow">
                                                    {Object.entries(stat.types).map(([typeName, typeTotal]) => (
                                                        <div key={typeName} className="flex justify-between items-center text-xs border-b border-slate-50 pb-1.5 last:border-0 last:pb-0">
                                                            <span className="text-slate-500 font-medium">{typeName}</span>
                                                            <span className="font-bold text-slate-700">฿{typeTotal.toLocaleString()}</span>
                                                        </div>
                                                    ))}
                                                </div>

                                                <div className="pt-3 border-t border-slate-100">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">ยอดรวมรับสุทธิ</div>
                                                    <span className="text-xl font-black text-indigo-600">฿{stat.total.toLocaleString()}</span>
                                                </div>
                                            </div>
                                        ))}
                                        {summaryByNumber.length === 0 && (
                                            <div className="col-span-full py-20 flex flex-col items-center justify-center text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200">
                                                <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4"><Icon name="pie-chart" size={24} className="opacity-50" /></div>
                                                <p className="font-medium">ยังไม่มีข้อมูลสำหรับวิเคราะห์</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* Settings Tab */}
                            {activeTab === 'settings' && (
                                <div className="p-6 md:p-10 max-w-3xl mx-auto flex-grow w-full">
                                    <div className="mb-8">
                                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-3">ตั้งค่าระบบ</h2>
                                        <p className="text-sm text-slate-500 mt-1">จัดการ API และข้อมูลจ้าวรับหวย</p>
                                    </div>

                                    <div className="space-y-8">
                                        <div className="bg-white p-6 md:p-8 rounded-[24px] shadow-sm border border-slate-100 space-y-4">
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center"><Icon name="link" size={16}/></div>
                                                <h3 className="font-bold text-slate-800">เชื่อมต่อ Google Sheets</h3>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-semibold text-slate-500 ml-1">Web App URL</label>
                                                <input value={sheetUrl} onChange={e => setSheetUrl(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm outline-none focus:border-indigo-500 focus:bg-white transition-colors" />
                                            </div>
                                        </div>

                                        <div className="bg-white p-6 md:p-8 rounded-[24px] shadow-sm border border-slate-100">
                                            <div className="flex justify-between items-center mb-6">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center"><Icon name="users" size={16}/></div>
                                                    <h3 className="font-bold text-slate-800">จัดการจ้าว & เลขอั้น</h3>
                                                </div>
                                                <button onClick={addReceiver} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 hover:bg-slate-800 transition-colors">
                                                    <Icon name="plus" size={16}/> เพิ่มจ้าว
                                                </button>
                                            </div>
                                            
                                            <div className="space-y-4">
                                                {receivers.map(r => (
                                                    <div key={r.id} className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                                        <div className="flex justify-between items-center mb-4">
                                                            <span className="text-lg font-bold text-slate-800">{r.name}</span>
                                                            <button onClick={() => receivers.length > 1 && setReceivers(receivers.filter(x => x.id !== r.id))} className="w-8 h-8 rounded-full bg-white border border-slate-200 text-slate-400 flex items-center justify-center hover:text-rose-500 hover:border-rose-200 transition-colors">
                                                                <Icon name="trash-2" size={14}/>
                                                            </button>
                                                        </div>
                                                        <div className="space-y-3">
                                                            <label className="text-xs font-semibold text-slate-500 ml-1">เพิ่มเลขอั้น (สลับตำแหน่งให้อัตโนมัติ)</label>
                                                            <div className="flex gap-2">
                                                                <input id={`input-${r.id}`} type="number" placeholder="เช่น 123" className="flex-grow p-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-base font-mono" />
                                                                <button onClick={() => { 
                                                                    const v = document.getElementById(`input-${r.id}`).value; 
                                                                    if(v) addBlockedNumberSmart(r.id, v); 
                                                                    document.getElementById(`input-${r.id}`).value = ''; 
                                                                }} className="bg-indigo-50 text-indigo-600 px-5 rounded-xl font-semibold hover:bg-indigo-100 transition-colors">เพิ่ม</button>
                                                            </div>
                                                            {r.blockedNumbers.length > 0 && (
                                                                <div className="flex flex-wrap gap-2 pt-3">
                                                                    {r.blockedNumbers.map(num => (
                                                                        <div key={num} className="bg-white px-3 py-1.5 rounded-lg border border-slate-200 text-slate-600 font-mono text-xs flex items-center gap-2 group hover:border-rose-200 transition-colors">
                                                                            {num}
                                                                            <button onClick={() => setReceivers(receivers.map(x => x.id === r.id ? {...x, blockedNumbers: x.blockedNumbers.filter(z => z !== num)} : x))} className="text-slate-300 group-hover:text-rose-500">
                                                                                <Icon name="x" size={14}/>
                                                                            </button>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                        
                        {/* Modal Previews PDF */}
                        {showPreview && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm overflow-y-auto">
                                <div className="bg-white rounded-[32px] w-full max-w-4xl shadow-2xl relative flex flex-col max-h-[90vh] overflow-hidden border border-slate-100">
                                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white z-10">
                                        <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                            <Icon name="file-text" size={20} className="text-indigo-600" /> เอกสารรายงาน (PDF Preview)
                                        </h2>
                                        <button onClick={() => setShowPreview(false)} className="w-10 h-10 bg-slate-50 hover:bg-slate-100 rounded-full flex items-center justify-center text-slate-500 transition-colors">
                                            <Icon name="x" size={20} />
                                        </button>
                                    </div>
                                    
                                    <div className="flex-grow overflow-y-auto p-4 md:p-8 bg-slate-50 custom-scrollbar">
                                        <div className="bg-white p-6 md:p-10 shadow-sm rounded-2xl mx-auto max-w-[800px] border border-slate-200">
                                            <div className="border-b border-slate-200 pb-4 mb-6 flex justify-between items-end">
                                                <div>
                                                    <h1 className="text-2xl font-bold text-slate-800 mb-1">รายงานสรุปยอด</h1>
                                                    <p className="text-slate-500 text-xs font-medium uppercase tracking-wider">Consolidated Report</p>
                                                </div>
                                                <div className="text-right text-slate-400 text-xs font-medium">พิมพ์เมื่อ: {new Date().toLocaleString('th-TH')}</div>
                                            </div>
                                            <table className="w-full mb-6 text-sm border-collapse">
                                                <thead>
                                                    <tr className="bg-slate-50 border-y border-slate-200">
                                                        <th className="p-3 text-left font-semibold text-slate-500 w-12">#</th>
                                                        <th className="p-3 text-left font-semibold text-slate-500">รายการ</th>
                                                        <th className="p-3 text-left font-semibold text-slate-500">ประเภท / ส่ง</th>
                                                        <th className="p-3 text-right font-semibold text-slate-500">ราคา (บาท)</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {entries.map((item, index) => (
                                                        <tr key={item.id} className="border-b border-slate-100">
                                                            <td className="p-3 text-slate-400">{index + 1}</td>
                                                            <td className="p-3 font-mono font-bold text-slate-800 text-lg">{item.displayValue}</td>
                                                            <td className="p-3">
                                                                <div className="text-indigo-600 text-[10px] uppercase font-bold">{item.typeName}</div>
                                                                <div className="text-slate-400 text-[10px] font-medium">To: {item.receiverName}</div>
                                                            </td>
                                                            <td className="p-3 text-right font-bold text-slate-800">฿{item.price.toLocaleString()}</td>
                                                        </tr>
                                                    ))}
                                                    <tr className="bg-indigo-50/50">
                                                        <td colSpan="3" className="p-4 text-right text-slate-600 text-sm font-bold">รวมยอดสุทธิ</td>
                                                        <td className="p-4 text-right text-indigo-700 text-xl font-bold border-t-2 border-indigo-200">฿{totalPrice.toLocaleString()}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    
                                    <div className="p-6 border-t border-slate-100 bg-white flex flex-col sm:flex-row gap-3 z-10">
                                        <button onClick={() => setShowPreview(false)} className="flex-1 py-4 font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all">แก้ไขข้อมูล</button>
                                        <button onClick={startExportPDF} disabled={isGeneratingPDF} className={`flex-[2] py-4 rounded-xl text-white font-bold flex justify-center items-center gap-2 shadow-sm transition-all ${isGeneratingPDF ? 'bg-indigo-400' : 'bg-indigo-600 hover:bg-indigo-700 hover:shadow-md'}`}>
                                            {isGeneratingPDF ? <Icon name="loader" className="animate-spin" /> : <Icon name="download" />} 
                                            {isGeneratingPDF ? 'กำลังสร้าง PDF...' : 'ดาวน์โหลดไฟล์ PDF'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Hidden PDF Render Zone - Kept completely intact */}
                        <div id="pdf-render-zone">
                            {isGeneratingPDF && pdfExportData.chunks[pdfExportData.currentIndex] && (
                                <div className="pdf-page-container">
                                    <div style={{ borderBottom: '3px solid #4338ca', paddingBottom: '10px', marginBottom: '15px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                                        <div>
                                            <h1 style={{ fontSize: '24px', fontWeight: '900', color: '#4338ca', margin: '0' }}>รายงานหวยรวมจ้าว (Compact)</h1>
                                            <p style={{ color: '#64748b', fontWeight: 'bold', margin: '3px 0 0 0', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '10px' }}>Receiver Management System &bull; Professional Edition</p>
                                        </div>
                                        <div style={{ textAlign: 'right', color: '#94a3b8', fontSize: '11px', fontWeight: 'bold' }}>หน้า {pdfExportData.currentIndex + 1} / {pdfExportData.chunks.length} | {new Date().toLocaleString('th-TH')}</div>
                                    </div>
                                    <table className="pdf-table">
                                        <thead><tr><th style={{width: '40px'}}>#</th><th>ตัวเลข/รายละเอียด</th><th>ประเภท / จ้าว</th><th style={{ textAlign: 'right' }}>ราคา (บาท)</th></tr></thead>
                                        <tbody>
                                            {pdfExportData.chunks[pdfExportData.currentIndex].map((item, index) => (
                                                <tr key={item.id}>
                                                    <td style={{ color: '#94a3b8', fontWeight: 'bold' }}>{(pdfExportData.currentIndex * 35) + index + 1}</td>
                                                    <td style={{ fontSize: '18px', fontWeight: 'bold', fontFamily: 'JetBrains Mono', color: '#1e293b' }}>{item.displayValue}</td>
                                                    <td>
                                                        <div style={{ color: '#4338ca', fontWeight: 'bold', fontSize: '11px', textTransform: 'uppercase' }}>{item.typeName}</div>
                                                        <div style={{ color: '#94a3b8', fontSize: '10px' }}>ส่ง: {item.receiverName}</div>
                                                    </td>
                                                    <td style={{ textAlign: 'right', fontSize: '16px', fontWeight: 'bold', color: '#0f172a' }}>{item.price.toLocaleString()}</td>
                                                </tr>
                                            ))}
                                            {pdfExportData.currentIndex === pdfExportData.chunks.length - 1 && (
                                                <tr className="pdf-total-row">
                                                    <td colSpan="3" style={{ textAlign: 'right', padding: '15px 10px', fontSize: '16px', color: '#312e81', borderTop: '2px solid #4338ca' }}>ยอดรวมสุทธิทั้งสิ้น</td>
                                                    <td style={{ textAlign: 'right', padding: '15px 10px', fontSize: '24px', color: '#4338ca', borderTop: '2px solid #4338ca', borderBottom: '4px double #4338ca' }}>฿{totalPrice.toLocaleString()}</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                    <div style={{ marginTop: '20px', textAlign: 'center', fontSize: '9px', color: '#cbd5e1', letterSpacing: '3px', fontWeight: 'bold', textTransform: 'uppercase' }}>Smart Data Matrix Sync &bull; 2026 Edition</div>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <footer className="text-center mt-6 text-xs text-slate-400 font-medium">
                        &copy; 2026 Smart Data Sync &bull; Professional Management UI
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

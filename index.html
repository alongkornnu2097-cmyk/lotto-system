<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงตัวเลขหวย - Professional Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* สไตล์สำหรับพื้นที่เรนเดอร์ PDF (ซ่อนจากหน้าจอปกติ) */
        #pdf-render-zone { 
            position: absolute; 
            left: -9999px; 
            top: -9999px; 
            width: 750px; 
            background: #ffffff; 
        }
        .pdf-page-container {
            padding: 50px;
            background: #ffffff;
            color: #000000;
        }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pdf-table th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; font-size: 16px; font-weight: bold; color: #1e293b; }
        .pdf-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 16px; }
        .pdf-total-row { background: #f5f3ff !important; font-weight: bold; border-top: 2px solid #4338ca; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [entries, setEntries] = useState([]);
            const [blockedNumbers, setBlockedNumbers] = useState([]); 
            const [number, setNumber] = useState('');
            const [price, setPrice] = useState('');
            const [type, setType] = useState('3-direct');
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('entry');
            const [isSaving, setIsSaving] = useState(false);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [showPreview, setShowPreview] = useState(false);
            const [pdfExportData, setPdfExportData] = useState({ chunks: [], currentIndex: -1 });
            const [pdfInstance, setPdfInstance] = useState(null);
            
            const [sheetUrl, setSheetUrl] = useState('https://script.google.com/macros/s/AKfycbxmTp_gZ7iJf8ixFNRVxnNr8yoPI2f6flxZ71hUZdwSbfcZb8KUvpViB8GvySHxIKRN/exec');

            const typeList = [
                { id: '3-direct', label: '3 ตัวตรง' },
                { id: '3-permute', label: '3 ตัวกลับ' },
                { id: '2-todd', label: '2 ตัวโต๊ด' },
                { id: '2-top', label: '2 ตัวบน' },
                { id: '2-top-permute', label: '2 ตัวบนกลับ' },
                { id: '2-bottom', label: '2 ตัวล่าง' },
                { id: '2-bottom-permute', label: '2 ตัวล่างกลับ' },
                { id: 'top-float', label: 'ตัวลอยบน' },
                { id: 'bottom-float', label: 'ตัวลอยล่าง' },
                { id: 'pack-4', label: 'แพ 4 ตัว' },
                { id: 'pack-5', label: 'แพ 5 ตัว' }
            ];

            const getPermutations = (str) => {
                if (!str) return [];
                if (str.length <= 1) return [str];
                const perms = [];
                for (let i = 0; i < str.length; i++) {
                    const char = str[i];
                    const remainingChars = str.slice(0, i) + str.slice(i + 1);
                    for (const p of getPermutations(remainingChars)) perms.push(char + p);
                }
                return [...new Set(perms)]; 
            };

            const showAlert = (msg, type = 'error') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleAddEntry = (e) => {
                e.preventDefault();
                if (!number || !price) { showAlert('กรุณากรอกตัวเลขและราคา'); return; }

                // Check blocked numbers (Smart Block)
                const inputPerms = getPermutations(number);
                if (inputPerms.find(p => blockedNumbers.includes(p))) {
                    showAlert(`เลขชุดนี้ติดเลขปิด: ${number}`, 'error');
                    return;
                }

                // Multi-Price Logic: 110*22*5 or 100*10
                const priceParts = price.toLowerCase().split(/[x*]/);
                const mainPrice = parseFloat(priceParts[0]);
                let subPrice = mainPrice; 
                if (priceParts.length > 1) {
                    const secondPart = parseFloat(priceParts[1]);
                    const permsCount = getPermutations(number).length;
                    if (secondPart === permsCount && priceParts.length === 2) {
                        subPrice = mainPrice;
                    } else {
                        subPrice = secondPart;
                    }
                }

                let newItems = [];
                const isPermuteType = ['3-permute', '2-top-permute', '2-bottom-permute'].includes(type);

                if (isPermuteType) {
                    const perms = getPermutations(number);
                    const selectedType = typeList.find(t => t.id === type);
                    newItems = perms.map(p => {
                        const itemPrice = (p === number) ? mainPrice : subPrice;
                        return {
                            id: Math.random().toString(36).substr(2, 9),
                            number: p,
                            typeId: type,
                            typeName: selectedType.label,
                            displayValue: `${p}=${itemPrice}`, 
                            price: itemPrice,
                            isPrimary: p === number
                        };
                    });
                } else {
                    const selectedType = typeList.find(t => t.id === type);
                    newItems = [{
                        id: Math.random().toString(36).substr(2, 9),
                        number,
                        typeId: type,
                        typeName: selectedType ? selectedType.label : 'ทั่วไป',
                        displayValue: `${number}=${mainPrice}`,
                        price: mainPrice,
                        isPrimary: true
                    }];
                }

                setEntries([...entries, ...newItems]);
                setNumber('');
                setPrice('');
                showAlert(`เพิ่ม ${newItems.length} รายการแล้ว`, 'success');
            };

            const saveToGoogleSheets = async () => {
                if (entries.length === 0) return;
                setIsSaving(true);
                try {
                    await fetch(sheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        body: JSON.stringify({ entries: entries })
                    });
                    showAlert('บันทึกข้อมูลเรียบร้อยแล้ว!', 'success');
                    setEntries([]); 
                } catch (error) {
                    showAlert('การเชื่อมต่อผิดพลาด');
                } finally {
                    setIsSaving(false);
                }
            };

            // PDF Pagination Logic
            const chunkArray = (array, size) => {
                const chunks = [];
                for (let i = 0; i < array.length; i += size) {
                    chunks.push(array.slice(i, i + size));
                }
                return chunks;
            };

            const startExportPDF = () => {
                if (entries.length === 0) return;
                setIsGeneratingPDF(true);
                const chunks = chunkArray(entries, 20); 
                setPdfExportData({ chunks, currentIndex: 0 });
            };

            useEffect(() => {
                if (isGeneratingPDF && pdfExportData.currentIndex >= 0) {
                    processPdfPage();
                }
            }, [pdfExportData.currentIndex]);

            const processPdfPage = async () => {
                const { chunks, currentIndex } = pdfExportData;
                const element = document.getElementById('pdf-render-zone');
                
                try {
                    await new Promise(r => setTimeout(r, 1200)); 

                    const canvas = await html2canvas(element, { 
                        scale: 3, 
                        useCORS: true,
                        backgroundColor: "#ffffff",
                        logging: false
                    });

                    const imgData = canvas.toDataURL('image/png');
                    let currentPdf = pdfInstance;

                    if (currentIndex === 0) {
                        currentPdf = new jspdf.jsPDF('p', 'mm', 'a4');
                    } else {
                        currentPdf.addPage();
                    }

                    const pdfWidth = currentPdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    currentPdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);

                    if (currentIndex < chunks.length - 1) {
                        setPdfInstance(currentPdf);
                        setPdfExportData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 }));
                    } else {
                        currentPdf.save(`Report-${new Date().getTime()}.pdf`);
                        showAlert('ดาวน์โหลด PDF สำเร็จ', 'success');
                        resetPdfExport();
                    }
                } catch (err) {
                    showAlert('สร้าง PDF ไม่สำเร็จ');
                    resetPdfExport();
                }
            };

            const resetPdfExport = () => {
                setIsGeneratingPDF(false);
                setShowPreview(false);
                setPdfExportData({ chunks: [], currentIndex: -1 });
                setPdfInstance(null);
            };

            const totalPrice = useMemo(() => entries.reduce((sum, item) => sum + item.price, 0), [entries]);

            return (
                <div className="min-h-screen p-2 md:p-8">
                    <div className="max-w-4xl mx-auto shadow-2xl rounded-2xl overflow-hidden bg-white">
                        <header className="bg-indigo-700 text-white p-5 flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-bold flex items-center gap-2"><Icon name="target" /> ระบบลงหวยอัจฉริยะ</h1>
                                <p className="text-[10px] text-indigo-200 uppercase tracking-widest mt-1">Matrix Expansion & Page-Fitted PDF</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setActiveTab('entry')} className={`p-2 rounded-xl transition-all ${activeTab === 'entry' ? 'bg-white text-indigo-700 shadow-md scale-105' : 'hover:bg-indigo-600'}`}><Icon name="list" size={20}/></button>
                                <button onClick={() => setActiveTab('settings')} className={`p-2 rounded-xl transition-all ${activeTab === 'settings' ? 'bg-white text-indigo-700 shadow-md scale-105' : 'hover:bg-indigo-600'}`}><Icon name="settings" size={20}/></button>
                            </div>
                        </header>

                        {notification && (
                            <div className={`fixed top-4 right-4 z-[200] p-4 rounded-2xl shadow-2xl text-white font-bold animate-bounce flex items-center gap-3 ${notification.type === 'error' ? 'bg-red-500' : 'bg-green-600'}`}>
                                <Icon name={notification.type === 'error' ? 'shield-alert' : 'check-circle-2'} size={24} />
                                <span>{notification.msg}</span>
                            </div>
                        )}

                        {activeTab === 'entry' ? (
                            <div className="grid md:grid-cols-2 divide-x divide-slate-100 min-h-[550px]">
                                <div className="p-5 md:p-8 space-y-6">
                                    <form onSubmit={handleAddEntry} className="space-y-5">
                                        <div className="grid grid-cols-3 gap-2">
                                            {typeList.map(t => (
                                                <button key={t.id} type="button" onClick={() => { setType(t.id); setNumber(''); }} className={`p-2 text-[10px] rounded-xl border-2 transition-all ${type === t.id ? 'bg-indigo-600 text-white border-indigo-600 font-bold shadow-md' : 'bg-slate-50 border-slate-100 text-slate-500 hover:border-indigo-200'}`}>{t.label}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-4">
                                            <div className="w-1/2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block tracking-wider">ตัวเลข</label>
                                                <input type="number" value={number} onChange={e => setNumber(e.target.value)} placeholder="000" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-3xl outline-none focus:border-indigo-500 text-center" />
                                            </div>
                                            <div className="w-1/2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block tracking-wider">ราคา (110*22*5)</label>
                                                <input type="text" value={price} onChange={e => setPrice(e.target.value)} placeholder="0" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-3xl outline-none focus:border-indigo-500 text-center font-bold text-indigo-700" />
                                            </div>
                                        </div>
                                        <button className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-lg flex items-center justify-center gap-3 transition-transform active:scale-95"><Icon name="plus" /> เพิ่มรายการ</button>
                                    </form>

                                    <div className="bg-rose-50 p-4 rounded-xl border-2 border-rose-100 shadow-sm">
                                        <div className="flex items-center gap-2 text-rose-800 font-bold mb-2 font-black uppercase text-xs"><Icon name="lock" size={16} /> เลขปิดงวดนี้:</div>
                                        <div className="flex flex-wrap gap-2">
                                            {blockedNumbers.length > 0 ? (
                                                blockedNumbers.map(n => <span key={n} className="bg-white px-3 py-1 rounded-lg border border-rose-200 text-xs font-mono font-black text-rose-600 shadow-sm">{n}</span>)
                                            ) : (
                                                <span className="text-xs text-rose-400 italic">ไม่ได้ตั้งเลขปิด</span>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="p-0 bg-slate-50/30 flex flex-col h-[600px] md:h-auto">
                                    <div className="p-6 flex justify-between items-center border-b border-slate-100"><h3 className="font-black text-slate-800 flex items-center gap-2"><Icon name="shopping-cart" size={18} className="text-indigo-500" /> ตะกร้า ({entries.length})</h3></div>
                                    <div className="flex-grow overflow-y-auto space-y-2 p-6 custom-scrollbar">
                                        {entries.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 py-20 opacity-30">
                                                <Icon name="box" size={64} />
                                                <p className="text-sm font-bold uppercase tracking-widest">ว่างเปล่า</p>
                                            </div>
                                        ) : (
                                            entries.map(item => (
                                                <div key={item.id} className={`bg-white p-4 rounded-xl border-2 flex justify-between items-center shadow-sm transition-all ${item.isPrimary ? 'border-indigo-200 ring-2 ring-indigo-50 scale-[1.02]' : 'border-slate-50 opacity-80'}`}>
                                                    <div>
                                                        <div className={`font-mono font-black text-2xl ${item.isPrimary ? 'text-indigo-700' : 'text-slate-600'}`}>{item.number}</div>
                                                        <div className="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">{item.typeName} {item.isPrimary && '(หลัก)'}</div>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <span className="font-black text-lg text-slate-700">฿{item.price.toLocaleString()}</span>
                                                        <button onClick={() => setEntries(entries.filter(e => e.id !== item.id))} className="text-slate-200 hover:text-rose-500 transition-colors"><Icon name="trash-2" size={18} /></button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                    <div className="p-6 bg-white border-t-2 border-slate-100 space-y-3">
                                        <div className="flex justify-between items-end"><span className="text-xs text-slate-400 font-bold uppercase tracking-widest">ยอดรวม</span><span className="text-3xl font-black text-indigo-900 leading-none">฿{totalPrice.toLocaleString()}</span></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={() => setShowPreview(true)} disabled={entries.length === 0} className="py-3 rounded-xl font-bold flex justify-center items-center gap-2 border-2 border-indigo-600 text-indigo-700 hover:bg-indigo-50 shadow-sm transition-all active:scale-95 disabled:opacity-30"><Icon name="eye" size={18} /> ดูรายงาน PDF</button>
                                            <button onClick={saveToGoogleSheets} disabled={isSaving || entries.length === 0} className="py-3 rounded-xl text-white font-bold flex justify-center items-center gap-2 bg-emerald-600 hover:bg-emerald-700 active:scale-95 transition-all shadow-lg disabled:opacity-30"><Icon name="send" /> ส่ง Google Sheet</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="p-8 space-y-10 max-w-2xl mx-auto min-h-[500px]">
                                <h2 className="text-3xl font-black text-slate-800 border-b-4 border-indigo-100 pb-4 flex items-center gap-3"><Icon name="settings-2" className="text-indigo-600" /> ตั้งค่าระบบ</h2>
                                <div className="space-y-4">
                                    <label className="text-sm font-black text-slate-500 uppercase tracking-widest block font-bold">Web App URL (Google Script)</label>
                                    <input value={sheetUrl} onChange={e => setSheetUrl(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-xs focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all shadow-inner" />
                                </div>
                                <div className="space-y-5 pt-6">
                                    <div className="flex justify-between items-end font-bold"><label className="text-sm font-black text-slate-500 uppercase tracking-widest block">จัดการเลขปิด</label><button onClick={() => setBlockedNumbers([])} className="text-[10px] font-black text-rose-600 border border-rose-200 px-3 py-1 rounded-lg hover:bg-rose-50 transition-all">ล้างทั้งหมด</button></div>
                                    <div className="flex gap-3"><input id="new-block-input" type="number" placeholder="กรอกเลขปิด" className="flex-grow p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-xl outline-none focus:border-rose-300 shadow-inner" /><button onClick={() => { const v = document.getElementById('new-block-input').value; if(v) setBlockedNumbers([...blockedNumbers, v]); document.getElementById('new-block-input').value = ''; }} className="bg-rose-600 text-white px-8 rounded-2xl font-black transition-all shadow-lg active:scale-95">เพิ่ม</button></div>
                                    <div className="grid grid-cols-4 gap-3">{blockedNumbers.map(n => <div key={n} className="bg-white text-rose-600 p-3 rounded-xl font-black border-2 border-rose-50 flex justify-between items-center shadow-sm"><span>{n}</span><button onClick={() => setBlockedNumbers(blockedNumbers.filter(x => x !== n))}><Icon name="x-circle" size={14} /></button></div>)}</div>
                                </div>
                            </div>
                        )}
                        
                        {/* --- Preview Modal --- */}
                        {showPreview && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-all overflow-y-auto">
                                <div className="bg-white rounded-3xl w-full max-w-4xl shadow-2xl relative flex flex-col max-h-[90vh]">
                                    <div className="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-3xl">
                                        <h2 className="font-black text-slate-700 flex items-center gap-2"><Icon name="eye" size={20} className="text-indigo-600" /> ตรวจสอบตัวอย่างก่อนพิมพ์</h2>
                                        <button onClick={() => setShowPreview(false)} className="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-400"><Icon name="x" size={24} /></button>
                                    </div>
                                    <div className="flex-grow overflow-y-auto p-4 md:p-10 bg-slate-100 custom-scrollbar">
                                        <div className="bg-white p-6 md:p-12 shadow-sm rounded-lg mx-auto max-w-[800px] border border-slate-200">
                                            <div className="border-b-4 border-indigo-700 pb-4 mb-6 flex justify-between items-end">
                                                <div><h1 className="text-3xl font-black text-indigo-700 leading-tight">สรุปรายการหวย</h1><p className="text-slate-500 font-bold tracking-widest uppercase text-[10px]">Matrix Expansion & Professional Mode</p></div>
                                                <div className="text-right text-slate-400 font-bold uppercase text-[10px]">พิมพ์เมื่อ: {new Date().toLocaleString('th-TH')}</div>
                                            </div>
                                            <table className="w-full mb-10 text-sm">
                                                <thead><tr className="bg-slate-100"><th className="p-3 text-left">ลำดับ</th><th className="p-3 text-left">ตัวเลข</th><th className="p-3 text-left">ประเภท</th><th className="p-3 text-right">ราคา</th></tr></thead>
                                                <tbody>
                                                    {entries.map((item, index) => (
                                                        <tr key={item.id} className="border-b border-slate-50"><td className="p-3 text-slate-400">{index + 1}</td><td className="p-3 font-mono font-black text-xl">{item.number}</td><td className="p-3 text-indigo-600 text-[10px] uppercase font-bold">{item.typeName}</td><td className="p-3 text-right font-black text-lg">฿{item.price.toLocaleString()}</td></tr>
                                                    ))}
                                                    <tr className="bg-indigo-50 font-black">
                                                        <td colSpan="3" className="p-4 text-right text-indigo-900 text-lg uppercase">รวมยอดสุทธิทั้งสิ้น</td>
                                                        <td className="p-4 text-right text-indigo-700 text-2xl underline decoration-double">฿{totalPrice.toLocaleString()}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="p-4 border-t bg-white rounded-b-3xl flex flex-col md:flex-row gap-3">
                                        <button onClick={() => setShowPreview(false)} className="flex-1 py-4 font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-2xl transition-all">กลับไปแก้ไข</button>
                                        <button onClick={startExportPDF} disabled={isGeneratingPDF} className={`flex-[2] py-4 rounded-2xl text-white font-black flex justify-center items-center gap-2 transition-all shadow-xl ${isGeneratingPDF ? 'bg-slate-400' : 'bg-indigo-600 hover:bg-indigo-700 active:scale-95 shadow-indigo-100'}`}>{isGeneratingPDF ? <><Icon name="loader" className="animate-spin" /> กำลังสร้าง PDF หน้า {pdfExportData.currentIndex + 1}...</> : <><Icon name="download" /> ยืนยันดาวน์โหลด PDF</>}</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- Hidden Zone for A4 Rendering --- */}
                        <div id="pdf-render-zone">
                            {isGeneratingPDF && pdfExportData.chunks[pdfExportData.currentIndex] && (
                                <div className="pdf-page-container">
                                    <div style={{ borderBottom: '6px solid #4338ca', paddingBottom: '15px', marginBottom: '25px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                                        <div>
                                            <h1 style={{ fontSize: '38px', fontWeight: '900', color: '#4338ca', margin: '0' }}>สรุปรายการลงหวย</h1>
                                            <p style={{ color: '#64748b', fontWeight: 'bold', margin: '5px 0 0 0', textTransform: 'uppercase', letterSpacing: '2px', fontSize: '11px' }}>Professional Management System</p>
                                        </div>
                                        <div style={{ textAlign: 'right', color: '#94a3b8', fontSize: '13px', fontWeight: 'bold' }}>
                                            หน้า {pdfExportData.currentIndex + 1} / {pdfExportData.chunks.length} | {new Date().toLocaleString('th-TH')}
                                        </div>
                                    </div>
                                    <table className="pdf-table">
                                        <thead>
                                            <tr>
                                                <th>ลำดับ</th><th>ตัวเลข</th><th>ประเภท</th><th style={{ textAlign: 'right' }}>ราคา (บาท)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {pdfExportData.chunks[pdfExportData.currentIndex].map((item, index) => (
                                                <tr key={item.id}>
                                                    <td style={{ color: '#94a3b8', fontWeight: 'bold' }}>{(pdfExportData.currentIndex * 20) + index + 1}</td>
                                                    <td style={{ fontSize: '26px', fontWeight: 'bold', fontFamily: 'JetBrains Mono', color: '#1e293b' }}>{item.number}</td>
                                                    <td style={{ color: '#4338ca', fontWeight: 'bold', fontSize: '14px', textTransform: 'uppercase' }}>{item.typeName}</td>
                                                    <td style={{ textAlign: 'right', fontSize: '22px', fontWeight: 'bold', color: '#0f172a' }}>{item.price.toLocaleString()}</td>
                                                </tr>
                                            ))}
                                            
                                            {/* บังคับแสดงยอดสรุปท้ายตารางเฉพาะในหน้าสุดท้ายเสมอ */}
                                            {pdfExportData.currentIndex === pdfExportData.chunks.length - 1 && (
                                                <tr className="pdf-total-row">
                                                    <td colSpan="3" style={{ textAlign: 'right', padding: '30px 20px', fontSize: '22px', color: '#312e81', borderTop: '2px solid #4338ca' }}>ยอดรวมสุทธิทั้งสิ้น</td>
                                                    <td style={{ textAlign: 'right', padding: '30px 20px', fontSize: '38px', color: '#4338ca', borderTop: '2px solid #4338ca', borderBottom: '6px double #4338ca' }}>฿{totalPrice.toLocaleString()}</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                    <div style={{ marginTop: '50px', textAlign: 'center', color: '#cbd5e1', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '6px', fontWeight: 'bold' }}>
                                        Verified Report &bull; Page {pdfExportData.currentIndex + 1} &bull; Cloud Backend Sync
                                    </div>
                                </div>
                            )}
                        </div>

                        <footer className="p-6 bg-slate-50 text-center text-[10px] text-slate-400 font-black uppercase tracking-[0.5em] border-t-2 border-slate-100">Smart Data Sync &bull; Professional Edition &bull; 2026</footer>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
